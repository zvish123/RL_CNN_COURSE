
<style>

  .zone-icon{font-size:13px}
  .main{flex:1;padding:16px 18px;overflow-y:auto}
  .zone-header{margin-bottom:12px}
  .zone-title{font-family:var(--font-mono);font-size:17px;margin-bottom:3px;display:flex;align-items:center;gap:8px}

  .q-text{font-size:14px;color:var(--txt);line-height:1.55;margin-bottom:12px;direction:rtl;text-align:right}

  .final-screen{text-align:center;padding:36px 20px;direction:rtl}
  .final-title{font-family:var(--font-mono);font-size:20px;color:var(--c5);margin-bottom:8px}
  .final-score{font-family:var(--font-mono);font-size:38px;color:var(--c2);margin:8px 0}

  .final-item{background:var(--bg2);border:1px solid var(--border);padding:10px 14px;border-radius:7px;font-size:13px}
  .final-item .label{font-size:11px;color:var(--dim);margin-bottom:3px}
  .final-item .val{font-family:var(--font-mono)}
  .restart-btn{padding:10px 26px;border:1px solid var(--c5);background:transparent;color:var(--c5);font-family:var(--font-mono);font-size:11px;border-radius:5px;cursor:pointer;letter-spacing:1px;transition:all .2s;margin-top:10px}
  .restart-btn:hover{background:rgba(255,214,0,.1)}
  .intro-screen{text-align:center;padding:28px 20px;direction:rtl}
  .intro-ascii{font-family:var(--font-mono);font-size:10px;color:var(--c1);line-height:1.3;margin-bottom:14px;opacity:.65}
  .intro-title{font-family:var(--font-mono);font-size:21px;color:var(--c1);margin-bottom:8px}
  .intro-sub{font-size:13px;color:var(--txt);max-width:480px;margin:0 auto 16px;line-height:1.6}
  .pass-notice{background:rgba(255,214,0,.07);border:1px solid rgba(255,214,0,.3);border-radius:6px;padding:10px 16px;font-family:var(--font-mono);font-size:12px;color:var(--c5);margin:0 auto 18px;max-width:400px}
  .zones-preview{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
  .zp{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:11px;font-family:var(--font-mono);color:var(--dim)}
  .start-btn{padding:11px 30px;border:2px solid var(--c1);background:transparent;color:var(--c1);font-family:var(--font-mono);font-size:13px;border-radius:6px;cursor:pointer;letter-spacing:2px;transition:all .2s}
  .start-btn:hover{background:rgba(0,229,255,.1)}
  .tag-correct{background:rgba(57,255,20,.15);color:var(--c2);padding:2px 7px;border-radius:3px;font-family:var(--font-mono);font-size:10px}
  .tag-wrong{background:rgba(255,107,53,.15);color:var(--c3);padding:2px 7px;border-radius:3px;font-family:var(--font-mono);font-size:10px}
  .pass-threshold{font-family:var(--font-mono);font-size:11px;color:var(--c5);margin-top:4px}
</style>

  {id:'net',name:'תקשורת',icon:'📡',color:'var(--c1)',

    {q:'מה תפקיד ה-Sequence Number בלחיצת יד TCP?',

    {q:'פורט 443 שייך לאיזה פרוטוקול?',

   ]
  },
  {id:'crypto',name:'קריפטו',icon:'🔐',color:'var(--c4)',

     ans:0,explain:'סימטרית (AES, Fernet) — מפתח אחד, מהירה. אסימטרית (RSA, DH) — זוג מפתחות ציבורי/פרטי, פותרת בעיית חלוקת מפתחות אך איטית יותר.'},
    {q:'מה אורך הפלט של פונקציית גיבוב MD5?',

    {q:'מה הופך חתימה דיגיטלית לתקפה לפי הגדרת Verify?',

     ans:1,explain:'Gen→(pk,sk). Sign(sk,m)→σ. Verify(pk,m,σ)→1 אם תקף. החותם שומר sk בסוד; כל אחד יכול לאמת עם pk. אמינות = רק בעל sk יכול לחתום.'},
   ]
  },
  {id:'os',name:'מ"ה',icon:'⚙️',color:'var(--c3)',

    {q:'מה ההבדל המרכזי בין Thread ל-Process?',

    {q:'מהו Deadlock ומה גורם לו?',

     ans:1,explain:'IPC = Inter-Process Communication. מנגנונים: Pipes, Sockets, Shared Memory, Message Queue, Mutex, Semaphore, Events. מטרה: מניעה הדדית ושיתוף נתונים.'},

    {q:'מה ההבדל בין DoS ל-DDoS?',
     opts:['DoS מהיר פי כמה מ-DDoS כי אינו דורש תיאום בין מחשבים','DoS ממחשב יחיד; DDoS ממספר מחשבים מסונכרנים (botnet)','DDoS מתמקד אך ורק בשכבת האפליקציה לעומת DoS בשכבת הרשת','אין הבדל מהותי — שניהם גורמים לאותה כמות נזק בדיוק'],
     ans:1,explain:'DoS = מקור אחד. DDoS = botnet — מאות/אלפי מכשירים נגועים ב-malware מציפים מכיוונים שונים. כך קשה לחסום לפי IP מקור בודד.'},
    {q:'איזו הגנה הכי אפקטיבית נגד מתקפת MITM?',
     opts:['הגדלת bandwidth הרשת עד שהתוקף אינו יכול לעכב תעבורה','TLS להצפנת הערוץ ואימות תעודת שרת (Certificate Pinning)','שימוש ב-UDP במקום TCP כי הוא אינו דורש Handshake מרובה','הפעלת Firewall בלבד שחוסם כתובות IP חשודות מראש'],
     ans:1,explain:'TLS מצפין את הערוץ. Certificate Pinning מוודא שהתעודה אותנטית ולא מזויפת. JWT חתום — גם אם מיורט, לא ניתן לזייף ללא המפתח הסודי.'},
    {q:'כיצד מנוצל Buffer Overflow ע"י תוקף?',
     opts:['העמסת ה-CPU בחישובים מורכבים עד להאטת המערכת לחלוטין','דריסת כתובת החזרה בזיכרון להפניית ביצוע לקוד זדוני של התוקף','גניבת מפתחות הצפנה השמורים בזיכרון התהליך הקורבן','שיבוש חבילות TCP ע"י כתיבה מחוץ לתחום מאגר הרשת'],
     ans:1,explain:'כתיבה מעבר לגבולות ה-buffer דורסת את ה-return address של הפונקציה. התוקף מכניס shellcode לזיכרון ומפנה אליו את הביצוע.'},
   ]
  },
  {id:'db',name:'DB & Flask',icon:'🗄️',color:'var(--c2)',
   questions:[
    {q:'לאיזה תת-שפה של SQL שייכת פקודת CREATE TABLE?',
     opts:['DML — Data Manipulation Language, לתפעול נתונים קיימים בטבלה','DDL — Data Definition Language, להגדרת מבנה מסד הנתונים','DCL — Data Control Language, לניהול הרשאות גישה למשתמשים','TCL — Transaction Control Language, לניהול טרנזקציות במסד'],
     ans:1,explain:'DDL כולל CREATE/ALTER/DROP — מגדיר מבנה. DML כולל SELECT/INSERT/UPDATE/DELETE — מפעיל נתונים. DCL כולל GRANT/REVOKE — מנהל הרשאות.'},
    {q:'מהו היתרון המרכזי של ORM כמו SQLAlchemy?',
     opts:['מהיר תמיד יותר מ-SQL ידני גם עבור שאילתות מורכבות ומסועפות','הגנה מובנית מ-SQL Injection דרך Parameterized Queries אוטומטיות','דורש אפס ידע ב-SQL ואפס הבנה של מבנה הטבלאות במסד','עובד רק עם SQLite ולכן מבטיח ביצועים עקביים ומדידים'],
     ans:1,explain:'ORM משתמש ב-Parameterized Queries אוטומטית — מפריד קוד מנתונים ומונע SQL Injection. גם: קוד קריא, ניוד קל בין מסדי נתונים שונים.'},
    {q:'מהו Flask ועל מה הוא מבוסס?',
     opts:['Framework כבד כמו Django הכולל ORM, Admin, וAuth מובנה','Micro-Framework לפיתוח Web ב-Python המבוסס על Werkzeug ו-Jinja2','ספריית UI לבניית ממשקים גרפיים בסגנון Material Design','מנוע מסד נתונים מובנה ב-Python לאחסון נתונים מקומי'],
     ans:1,explain:'Flask = Micro-Framework: קל, גמיש, לא כופה מבנה. Werkzeug = WSGI toolkit. Jinja2 = template engine. Route מוגדר עם @app.route().'},
    {q:'מה היתרון המרכזי של JWT על פני Session מסורתי?',
     opts:['JWT מהיר יותר בלבד בגלל גודל קטן — השרת עדיין שומר state','JWT הוא Stateless: השרת אינו שומר מידע, מתאים ל-Microservices','Session מאובטח תמיד יותר כי המידע נשמר בצד השרת בלבד','JWT דורש DB lookup בכל בקשה כדי לאמת את תוקף הטוקן'],
     ans:1,explain:'JWT = Stateless: השרת מאמת חתימה ומחלץ נתונים ללא DB. Session = Stateful, דורש אחסון צד שרת. JWT מתאים ל-API מבוזר ו-Microservices.'},
   ]
  }
];

const S={
  screen:'intro',zone:0,q:0,selected:null,answered:false,
  score:0,correct:0,total:0,
  zoneCorrect:Array(5).fill(0),
  zoneTotal:Array(5).fill(0),
  zonesComplete:Array(5).fill(false),
  zonesPassed:Array(5).fill(null),
  startTime:null,elapsed:0,timerInterval:null
};

function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60}
function qs(sel){return document.querySelector(sel)}
function getEl(id){return document.getElementById(id)}

function passMark(zIdx){
  const total=ZONES[zIdx].questions.length;
  return Math.ceil(total*PASS_THRESHOLD);
}

function render(){
  const app=qs('#app');
  if(S.screen==='intro'){app.innerHTML=introHTML();return}
  if(S.screen==='final'){app.innerHTML=finalHTML();return}

  const zone=ZONES[S.zone];
  const qs_arr=zone.questions;
  const q=qs_arr[S.q];
  const zCorrect=S.zoneCorrect[S.zone];
  const zTotal=S.zoneTotal[S.zone];
  const needed=passMark(S.zone);
  const progPct=(zCorrect/qs_arr.length)*100;
  const threshPct=(needed/qs_arr.length)*100;
  const done=S.zonesComplete[S.zone];
  const passed=S.zonesPassed[S.zone];

  app.innerHTML=`
    <div class="header">
      <div class="logo">[ CYBER_EXAM_v2.0 ]</div>
      <div class="timer-box">
        <span style="color:var(--dim);font-size:10px">SCORE</span>
        <span class="score-val">${S.score}</span>
        <span style="color:var(--dim);font-size:10px">TIME</span>
        <span class="timer-val" id="timer-el">${fmt(S.elapsed)}</span>
      </div>
    </div>
    <div class="zones">
      ${ZONES.map((z,i)=>{
        const p=S.zonesPassed[i];
        const locked=i>0&&!S.zonesComplete[i-1];
        let cls='zone-btn';
        if(i===S.zone)cls+=' active';
        if(S.zonesComplete[i])cls+=(p?' done':' failed-zone');
        if(locked)cls+=' locked';
        const icon=S.zonesComplete[i]?(p?'✅':'❌'):z.icon;
        return`<button class="${cls}" onclick="switchZone(${i})" style="${i===S.zone?'border-bottom-color:'+z.color:''}">
          <span class="zone-icon">${icon}</span>
          <span style="font-size:9px">${z.name}</span>
          ${S.zonesComplete[i]?`<span style="font-size:8px;color:${p?'var(--c2)':'var(--c3)'}">${S.zoneCorrect[i]}/${ZONES[i].questions.length}</span>`:''}
        </button>`}).join('')}
    </div>
    <div class="main">
      ${done ? zoneDoneHTML(S.zone) : `
      <div class="zone-header">
        <div class="zone-title" style="color:${zone.color}">${zone.icon} ${zone.name}</div>
        <div class="zone-sub" dir="rtl">שאלה ${S.q+1} מתוך ${qs_arr.length} | נדרש: ${needed}/${qs_arr.length} נכונות (${Math.round(PASS_THRESHOLD*100)}%)</div>
      </div>
      <div class="pass-bar-wrap">
        <div class="pass-label">
          <span>נכון: ${zCorrect}</span>
          <span style="color:var(--c5)">סף מעבר: ${needed}/${qs_arr.length}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${progPct}%;background:${zCorrect>=needed?'var(--c2)':'var(--c1)'}"></div>
          <div class="threshold-marker" style="left:${threshPct}%"></div>
        </div>
      </div>
      <div class="q-card">
        <div class="q-num">// Q${S.q+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="opts">
          ${q.opts.map((o,i)=>`
            <button class="opt ${S.answered?(i===q.ans?'correct':i===S.selected?'wrong':'disabled'):'disabled'}"
              onclick="${S.answered?'':'selectOpt('+i+')'}"
              style="${!S.answered?'cursor:pointer':''}" dir="rtl">
              <span class="opt-key" style="${S.answered&&i===q.ans?'color:var(--c2)':S.answered&&i===S.selected&&i!==q.ans?'color:var(--c3)':''}">${String.fromCharCode(65+i)}</span>
              ${o}
            </button>`).join('')}
        </div>
        ${S.answered?`
          <div class="explain" dir="rtl">
            ${S.selected===q.ans?'<span class="tag-correct">✓ נכון</span>':'<span class="tag-wrong">✗ שגוי</span>'}
            &nbsp;${q.explain}
          </div>
          <button class="next-btn" onclick="nextQ()" dir="rtl">${S.q<qs_arr.length-1?'שאלה הבאה ←':'סיים תחנה ←'}</button>
        `:''}
      </div>`}
    </div>`;
}

function zoneDoneHTML(idx){
  const z=ZONES[idx];
  const passed=S.zonesPassed[idx];
  const correct=S.zoneCorrect[idx];
  const total=z.questions.length;
  const needed=passMark(idx);
  const allDone=S.zonesComplete.every(Boolean);
  return`<div class="zone-complete">
    <div class="complete-icon">${passed?'🔓':'🔒'}</div>
    <div class="complete-title" style="color:${passed?'var(--c2)':'var(--c3)'}">${passed?'תחנת '+z.name+' — נפרצה!':'תחנת '+z.name+' — נכשלה'}</div>
    <div class="complete-sub" dir="rtl">ענית נכון על ${correct} מתוך ${total} שאלות (נדרש: ${needed})</div>
    <div class="score-breakdown">
      <div class="sb-item"><div class="sb-val" style="color:${passed?'var(--c2)':'var(--c3)'}">${correct}/${total}</div><div class="sb-label">תשובות נכונות</div></div>
      <div class="sb-item"><div class="sb-val" style="color:var(--c5)">${Math.round((correct/total)*100)}%</div><div class="sb-label">אחוז הצלחה</div></div>
    </div>
    ${!passed?`<button class="retry-btn" onclick="retryZone()">↺ נסה שוב תחנה זו</button>`:''}
    ${passed&&!allDone?`<div style="font-size:12px;color:var(--dim);margin-top:10px;direction:rtl">בחר בתחנה הבאה מהתפריט למעלה</div>`:''}
    ${allDone?`<button class="unlock-btn" onclick="showFinal()">הצג תוצאות סופיות →</button>`:''}
  </div>`}

function finalHTML(){
  const pct=S.total>0?Math.round((S.correct/S.total)*100):0;
  const passed=S.zonesPassed.filter(Boolean).length;
  return`<div class="screen"><div class="main final-screen">
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--dim);margin-bottom:6px">SESSION_COMPLETE</div>
    <div class="final-title">// ניתוח ביצועים</div>
    <div class="final-score">${S.score}</div>
    <div style="font-size:12px;color:var(--dim)">נקודות</div>
    <div class="final-grid">
      <div class="final-item"><div class="label">תשובות נכונות</div><div class="val" style="color:var(--c2)">${S.correct} / ${S.total}</div></div>
      <div class="final-item"><div class="label">אחוז הצלחה כולל</div><div class="val" style="color:var(--c5)">${pct}%</div></div>
      <div class="final-item"><div class="label">תחנות שנפרצו</div><div class="val" style="color:${passed===5?'var(--c2)':'var(--c3)'}">${passed} / 5</div></div>
      <div class="final-item"><div class="label">זמן כולל</div><div class="val">${fmt(S.elapsed)}</div></div>
    </div>
    <div style="margin:12px 0;font-family:var(--font-mono);font-size:11px;color:var(--dim)">// פירוט לפי תחנה</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
      ${ZONES.map((z,i)=>{const p=S.zonesPassed[i];const c=S.zoneCorrect[i];const t=z.questions.length;return`
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 14px;direction:rtl">
          <span style="font-size:13px">${z.icon} ${z.name}</span>
          <span style="font-family:var(--font-mono);font-size:12px;color:${p?'var(--c2)':'var(--c3)'}">${c}/${t} ${p?'✓':'✗'}</span>
        </div>`}).join('')}
    </div>
    <div style="font-size:13px;font-family:var(--font-mono);padding:10px;border:1px solid ${pct>=80?'rgba(57,255,20,.4)':pct>=60?'rgba(255,214,0,.4)':'rgba(255,107,53,.4)'};border-radius:6px;color:${pct>=80?'var(--c2)':pct>=60?'var(--c5)':'var(--c3)'}">
      ${pct>=80?'[ ACCESS_GRANTED ] מוכן למבחן המגן!':pct>=60?'[ PARTIAL_ACCESS ] חזור על הנושאים שנכשלת בהם':'[ ACCESS_DENIED ] נדרשת חזרה מעמיקה לפני המבחן'}
    </div>
    <button class="restart-btn" onclick="restart()">[ RESTART_SESSION ]</button>
  </div></div>`}

function introHTML(){return`
  <div class="screen"><div class="main intro-screen">
    <div class="intro-ascii">╔════════════════════════════╗<br>║  CYBER EXAM PREP v2.0      ║<br>║  5 ZONES · BREACH TO PASS  ║<br>╚════════════════════════════╝</div>
    <div class="intro-title">מבחן המגן — סימולטור</div>
    <div class="intro-sub">ענה על שאלות בחמש תחנות. כדי לפתוח את התחנה הבאה, עליך לעבור את סף המעבר.</div>
    <div class="pass-notice">⚡ סף מעבר: 60% תשובות נכונות בכל תחנה<br><span style="font-size:10px;opacity:.7">(3/5 בתחנות בנות 5 שאלות, 3/4 בתחנות בנות 4 שאלות)</span></div>
    <div class="zones-preview">${ZONES.map(z=>`<div class="zp">${z.icon} ${z.name}</div>`).join('')}</div>
    <button class="start-btn" onclick="startGame()">[ START_SESSION ]</button>
  </div></div>`}

function startGame(){
  S.screen='game';S.startTime=Date.now();
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(()=>{
    S.elapsed=Math.floor((Date.now()-S.startTime)/1000);
    const el=getEl('timer-el');if(el)el.textContent=fmt(S.elapsed);
  },1000);
  render();
}

function selectOpt(i){
  if(S.answered)return;
  S.selected=i;S.answered=true;
  S.zoneTotal[S.zone]++;S.total++;
  const q=ZONES[S.zone].questions[S.q];
  if(i===q.ans){S.score+=20;S.correct++;S.zoneCorrect[S.zone]++}
  render();
}

function nextQ(){
  const zone=ZONES[S.zone];
  if(S.q<zone.questions.length-1){
    S.q++;S.selected=null;S.answered=false;render();
  } else {
    const correct=S.zoneCorrect[S.zone];
    const needed=passMark(S.zone);
    const passed=correct>=needed;
    S.zonesPassed[S.zone]=passed;
    S.zonesComplete[S.zone]=true;
    S.selected=null;S.answered=false;render();
  }
}

function retryZone(){
  S.score-=S.zoneCorrect[S.zone]*20;
  S.correct-=S.zoneCorrect[S.zone];
  S.total-=S.zoneTotal[S.zone];
  S.zoneCorrect[S.zone]=0;S.zoneTotal[S.zone]=0;
  S.zonesComplete[S.zone]=false;S.zonesPassed[S.zone]=null;
  S.q=0;S.selected=null;S.answered=false;render();
}

function switchZone(i){
  if(i>0&&!S.zonesComplete[i-1])return;
  S.zone=i;S.q=0;S.selected=null;S.answered=false;render();
}

function showFinal(){
  clearInterval(S.timerInterval);S.screen='final';render();
}

function restart(){
  clearInterval(S.timerInterval);
  Object.assign(S,{screen:'intro',zone:0,q:0,selected:null,answered:false,
    score:0,correct:0,total:0,
    zoneCorrect:Array(5).fill(0),zoneTotal:Array(5).fill(0),
    zonesComplete:Array(5).fill(false),zonesPassed:Array(5).fill(null),elapsed:0});
  render();
}

render();
</script>
