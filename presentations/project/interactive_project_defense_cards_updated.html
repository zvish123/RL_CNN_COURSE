<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>סימולציית שאלות ותשובות – מבחן מגן פרויקט סיום סייבר</title>
<style>
  :root{
    --bg1:#08111f; --bg2:#102a43; --card:#ffffff; --ink:#132033;
    --muted:#5b6b80; --accent:#00c2ff; --accent2:#7c3aed; --ok:#16a34a;
    --warn:#f59e0b; --bad:#dc2626; --shadow:0 22px 60px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,"Noto Sans Hebrew",sans-serif;background:radial-gradient(circle at 20% 10%,#164e63 0,#08111f 42%,#020617 100%);color:white;overflow:hidden}
  .deck{width:100vw;height:100vh;display:grid;place-items:center;padding:28px}
  .slide{display:none;width:min(1180px,96vw);height:min(790px,102vh);position:relative}
  .slide.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:.35;transform:translateY(10px)}to{opacity:1;transform:none}}
  .panel{height:100%;border-radius:30px;background:linear-gradient(145deg,rgba(255,255,255,.96),rgba(245,249,255,.93));color:var(--ink);box-shadow:var(--shadow);padding:34px 42px;display:grid;grid-template-rows:auto 1fr auto;gap:18px;border:1px solid rgba(255,255,255,.45)}
  .top{display:flex;justify-content:space-between;gap:18px;align-items:center;border-bottom:2px solid #e5edf7;padding-bottom:16px}
  .badge{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;padding:10px 18px;border-radius:999px;font-weight:800;white-space:nowrap}
  h1,h2,h3{margin:0;line-height:1.15} h1{font-size:46px} h2{font-size:36px} h3{font-size:25px;color:#0f172a;margin-bottom:10px}
  .subtitle{font-size:22px;color:var(--muted);margin-top:10px}
  .content{display:grid;grid-template-columns:1.05fr .95fr;gap:24px;align-items:stretch;min-height:0}
  .question{border-radius:26px;background:#0f172a;color:white;padding:28px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
  .question:before{content:"?";position:absolute;left:24px;bottom:-45px;font-size:190px;font-weight:900;color:rgba(255,255,255,.06)}
  .question .label{font-size:22px;color:#9ddcff;font-weight:800;margin-bottom:16px}
  .question .q{font-size:38px;font-weight:900;line-height:1.25;z-index:1}
  .box{background:#f8fbff;border:1px solid #dbe7f3;border-radius:24px;padding:22px;overflow:auto}
  ul{margin:0;padding-right:24px;font-size:23px;line-height:1.55} li{margin:8px 0}.small{font-size:19px;color:var(--muted);line-height:1.5}.tip{border-right:7px solid var(--ok);background:#ecfdf5}.warn{border-right:7px solid var(--warn);background:#fffbeb}.bad{border-right:7px solid var(--bad);background:#fef2f2}.formula{font-size:25px;font-weight:800;background:#eef2ff;border:1px dashed #6366f1;border-radius:18px;padding:16px;line-height:1.4}.hidden{display:none}.actions{display:flex;justify-content:space-between;align-items:center;gap:14px;border-top:2px solid #e5edf7;padding-top:14px}.btns{display:flex;gap:12px;flex-wrap:wrap}button{border:0;border-radius:999px;padding:13px 20px;font-size:18px;font-weight:800;cursor:pointer;background:#e2e8f0;color:#0f172a}button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}button:hover{filter:brightness(.96);transform:translateY(-1px)}.progress{font-size:18px;color:var(--muted);font-weight:800}.rubric{width:100%;border-collapse:collapse;font-size:20px;background:white}.rubric th,.rubric td{border:1px solid #dbe7f3;padding:12px;text-align:right}.rubric th{background:#eaf2ff}.center{display:grid;place-items:center;text-align:center}.cover{grid-template-columns:1fr}.cover .question{min-height:300px}.chips{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;justify-content:center}.chip{background:#e0f2fe;color:#075985;padding:10px 16px;border-radius:999px;font-weight:800}.timer{font-size:22px;font-weight:900;color:#0f172a;background:#fff7ed;border:1px solid #fed7aa;border-radius:16px;padding:10px 16px}.note{font-size:21px;line-height:1.55}.kbd{font-family:monospace;background:#111827;color:white;border-radius:8px;padding:2px 8px;direction:ltr;display:inline-block}
</style>
</head>
<body>
<div class="deck" id="deck"></div>
<script>
const cards = [

{type:'cover',title:'איך נראה תלמיד שמצליח במבחן המגן?',sub:'הכנה מנטלית ומקצועית',q:'הבוחנים מחפשים הבנה, הסבר וחשיבה – לא שינון.',tips:['הבנה אמיתית של המערכת','יכולת להסביר ולא רק להראות קוד','חשיבה הנדסית וקבלת החלטות','חיבור קבוע לפרויקט שלך'],advice:'הבוחנים רוצים להבין מה אתה יודע, לא כמה דפים שיננת.'},
{title:'נוסחת התשובה המנצחת',q:'איך עונים כמעט לכל שאלה?',points:['1. הגדרה קצרה','2. הסבר טכנולוגי','3. חיבור לפרויקט','4. יתרון/חיסרון','5. דוגמה מהקוד'],advice:'השתמש במבנה קבוע. הוא יוצר תשובה מקצועית ומסודרת גם תחת לחץ.'},
{title:'איך לדבר במבחן',q:'איך להעביר את המסר בצורה מקצועית?',points:['שב זקוף והסתכל על הבוחן','דבר בקצב רגוע','עצור בין רעיונות','השתמש במונחים מקצועיים','ענה ישירות לשאלה'],advice:'הימנע מ: "נראה לי", "בערך", "אממ". העדף: "בחרתי", "מימשתי", "המערכת מבצעת".'},
{title:'מה עושים כשלא יודעים?',q:'איך מתמודדים עם שאלה קשה?',points:['אל תגיד "אין לי מושג"','הסבר את העיקרון שאתה כן יודע','נתח את הבעיה בקול','קשר למה שמימשת בפרויקט','הצע כיוון פתרון'],advice:'משפט טוב: "אני לא זוכר את הפרט המדויק, אבל העיקרון הוא..."'},
{title:'טעויות שמורידות ציון',q:'ממה צריך להימנע?',points:['תשובה ארוכה מדי','אי חיבור לפרויקט','שימוש לא מדויק במונחים','בלבול בין Hash להצפנה','אי יכולת להסביר קוד','מענה חלקי לשאלה'],advice:'קודם ענה על השאלה, אחר כך הרחב.'},
{title:'10 כללי הזהב למבחן',q:'הכללים שכל תלמיד צריך לזכור',points:['ענה לשאלה ורק אז הרחב','תמיד חבר לפרויקט','תן דוגמה מהמערכת','הסבר למה בחרת','ציין יתרון וחיסרון','דבר ברור ובביטחון','אל תנחש עובדות','תקן טעויות מיד','הכן 2 פונקציות להסבר','הכן 3 מתקפות והגנות'],advice:'אם תעמוד בכללים האלה – רמת ההצגה תשתפר משמעותית.'},

{type:'cover',title:'סימולציית שאלות ותשובות',sub:'מבחן מגן – פרויקט סיום סייבר',q:'כל תלמיד עונה. הקבוצה נותנת ביקורת מקצועית. המטרה: תשובה מדויקת, קצרה ומשכנעת.',tips:['מבנה קבוע: הגדרה → הסבר → חיבור לפרויקט → סיכון/יתרון','כל תשובה עד דקה וחצי','אחרי כל תשובה: שאלה מקשה אחת מהקבוצה'],advice:'הדגש לתלמידים: במבחן לא מספיק לדעת. צריך להעביר מסר בביטחון, בסדר נכון ובשפה מקצועית.'},
{title:'כרטיסייה 1 – הצגת הפרויקט',q:'תן לי הסבר של דקה על הפרויקט שלך.',points:['מה הבעיה שהפרויקט פותר?','מי המשתמשים?','מה הפתרון שבנית?','באילו טכנולוגיות השתמשת?','מה הערך או הייחודיות?'],advice:'פתחו בבעיה ולא בטכנולוגיה. משפט פתיחה חזק: “הפרויקט שלי פותר את בעיית ___ עבור ___ באמצעות ___”.'},
{title:'כרטיסייה 2 – ארכיטקטורת המערכת',q:'צייר את ארכיטקטורת המערכת והסבר את זרימת המידע.',points:['לקוח → שרת → מסד נתונים → חזרה ללקוח','מי יוזם את הבקשה?','איזה מידע נשלח?','איזה פרוטוקול מעביר את המידע?','איפה מתבצעים אימות, הרשאות ושמירה?'],advice:'תשובה חזקה כוללת תרשים פשוט. אם אי אפשר להסביר את המערכת בלי הקוד – ההסבר עדיין לא מוכן.'},
{title:'כרטיסייה 3 – בחירת טכנולוגיה',q:'למה בחרת בטכנולוגיות שבהן השתמשת?',points:['התאמה לגודל הפרויקט','קלות פיתוח ותחזוקה','ביצועים ואבטחה','ידע קודם של הצוות','חלופות שנשקלו'],advice:'אל תגידו “כי זה מה שמצאתי”. תגידו: “בחרתי ב־___ כי היא מתאימה ל־___, והחיסרון שלה הוא ___”.'},
{title:'כרטיסייה 4 – TCP מול UDP',q:'למה בחרת TCP או UDP בפרויקט?',points:['TCP אמין, מסודר ומבוסס חיבור','UDP מהיר אך לא מבטיח הגעה וסדר','TCP מתאים ללוגין, הודעות חשובות וקבצים','UDP מתאים לזמן אמת כשאיבוד קטן נסבל','הקשר לפורטים ול־socket'],advice:'חובה לחבר לפרויקט: “במערכת שלי בחרתי TCP כי אובדן הודעת התחברות/פקודה עלול לפגוע בפעולה התקינה”.'},
{title:'כרטיסייה 5 – Socket',q:'מה זה Socket ואיפה הוא מופיע בפרויקט שלך?',points:['נקודת קצה לתקשורת','כולל IP ו־Port','שרת מאזין, לקוח מתחבר','send/recv להעברת מידע','סגירת חיבור וניהול שגיאות'],advice:'הסבר טוב לא משתמש במילה Socket כדי להסביר Socket: “זה כמו שקע תקשורת תוכנתי שדרכו שתי תוכנות מחליפות מידע”.'},
{title:'כרטיסייה 6 – JWT',q:'למה השתמשת ב־JWT ומה הוא מכיל?',points:['משמש לאימות והרשאות','מורכב מ־Header, Payload, Signature','נשלח לרוב ב־Authorization: Bearer','השרת בודק חתימה ותוקף','לא שומרים בו סיסמאות או מידע רגיש'],advice:'שאלת המשך צפויה: “מה קורה אם משנים את ה־Payload?” תשובה: החתימה לא תתאים והטוקן ייפסל.'},
{title:'כרטיסייה 7 – TLS',q:'כיצד אתה מגן על התקשורת בין הלקוח לשרת?',points:['TLS מצפין את התעבורה','מאמת את זהות השרת באמצעות certificate','ב־handshake נוצרים מפתחות סשן','מגן מפני האזנה ושינוי מידע','לא מחליף בדיקות הרשאה בצד שרת'],advice:'אל תגידו רק “השתמשתי ב־HTTPS”. הסבירו מה זה נותן: סודיות, שלמות ואימות.'},
{title:'כרטיסייה 8 – SQL Injection',q:'האם המערכת שלך חשופה ל־SQL Injection? איך מנעת?',points:['הסיכון: קלט משתמש הופך לחלק משאילתה','פתרון: Prepared Statements או ORM','Validation לקלטים','הרשאות DB מינימליות','בדיקה בקוד איפה זה ממומש'],advice:'בוחן טוב יבקש לראות קוד. הכינו מראש פונקציה אחת שמדגימה הגנה אמיתית.'},
{title:'כרטיסייה 9 – מתקפות רלוונטיות',q:'לאילו מתקפות הפרויקט חשוף ומה עשית נגדן?',points:['SQL Injection','XSS','MITM','DDoS / עומס חריג','Broken Access Control','Brute Force / ניחוש סיסמאות'],advice:'מבנה מנצח לכל מתקפה: איך תוקפים → מה הנזק → איזו הגנה מימשתי → מה עדיין ניתן לשפר.'},
{title:'כרטיסייה 10 – הצפנה',q:'מתי משתמשים בהצפנה סימטרית ומתי באסימטרית?',points:['סימטרית: מפתח אחד, מהירה, מתאימה להצפנת מידע','אסימטרית: זוג מפתחות, איטית יותר, מתאימה להחלפת מפתח/חתימה','AES להצפנת נתונים','RSA/ECDH להחלפת מפתחות או חתימה','Hash אינו הצפנה'],advice:'משפט מקצועי: “במערכות אמיתיות משתמשים לרוב במודל היברידי: אסימטרי להחלפת מפתח, סימטרי להצפנת התוכן”.'},
{title:'כרטיסייה 11 – מסד נתונים',q:'למה בחרת במסד הנתונים הזה ואיך בנית את הטבלאות?',points:['אילו ישויות קיימות?','מה הקשרים בין הטבלאות?','Primary Key / Foreign Key','איפה נשמר מידע רגיש?','אינדקסים, כפילויות ושלמות נתונים'],advice:'הסבירו דרך דוגמה: “כאשר משתמש נרשם, נוצרת רשומה בטבלת Users, והפעולות שלו נשמרות בטבלת ___ עם user_id”.'},
{title:'כרטיסייה 12 – Threads / תהליכים',q:'למה השתמשת ב־Threads ומה הסיכונים?',points:['טיפול בכמה לקוחות במקביל','שמירה על תגובתיות','שיתוף זיכרון בין threads','סיכון Race Condition','סיכון Deadlock וצורך ב־Lock/Mutex'],advice:'אל תגידו “Thread זה מקביליות” בלבד. קשרו לפרויקט: “כל לקוח מקבל Thread כדי שלא יחסום לקוחות אחרים”.'},
{title:'כרטיסייה 13 – אתגר בפרויקט',q:'מה הייתה הבעיה הכי קשה בפרויקט ואיך פתרת אותה?',points:['בעיה מוגדרת היטב','ניסיון ראשון שלא עבד','איך בדקת ואבחנת?','הפתרון הסופי','מה למדת מזה?'],advice:'זו שאלה שמבדילה תלמיד שמבין מתלמיד שמדקלם. ספרו סיפור קצר של פתרון בעיה אמיתי.'},
{title:'כרטיסייה 14 – הסבר קוד',q:'בחר פונקציה מרכזית והסבר אותה.',points:['מה הקלט?','מה העיבוד?','מה הפלט?','אילו מקרי קצה קיימים?','אילו שגיאות מטופלות?'],advice:'הכינו מראש 2 פונקציות “כוכבות”: אחת עסקית ואחת אבטחתית. סמנו בקוד שורות חשובות.'},
{title:'כרטיסייה 15 – הרחבה עתידית',q:'אם היו לך עוד חודשיים, מה היית מוסיף?',points:['שיפור אבטחה','Dashboard / ניתוח נתונים','ניהול הרשאות מתקדם','בדיקות אוטומטיות','שיפור UX או ביצועים'],advice:'אל תענו “לא יודע”. בחרו הרחבה אחת, הסבירו למה היא חשובה ומה הצעד הראשון למימוש.'},
{type:'rubric',title:'כרטיסיית ביקורת קבוצתית',q:'לאחר כל תשובה הקבוצה מדרגת ונותנת הערה אחת לשיפור.',advice:'כל תלמיד מקבל ציון מהיר והערה אחת בלבד: “מה לשמר” ו“מה לשפר בתשובה הבאה”.'},
{type:'summary',title:'נוסחת תשובה מנצחת',q:'איך עונים כמעט לכל שאלה במבחן?',points:['1. הגדרה קצרה וברורה','2. הסבר טכנולוגי מדויק','3. חיבור ישיר לפרויקט שלי','4. יתרון, חיסרון או סיכון','5. דוגמה מהקוד או מהמערכת'],advice:'מילים שכדאי להחליף: במקום “נראה לי” אמרו “בחרתי ב...”; במקום “בערך” אמרו “המערכת מבצעת...”.'}
];
let idx=0;
function render(){
 const deck=document.getElementById('deck');
 deck.innerHTML=cards.map((c,i)=>slideHTML(c,i)).join('');
 document.querySelectorAll('.slide')[idx].classList.add('active');
 updateProgress();
}
function slideHTML(c,i){
 if(c.type==='rubric') return `<section class="slide"><div class="panel"><div class="top"><div><h2>${c.title}</h2><div class="subtitle">כלי קצר למשוב עמיתים בזמן סימולציה</div></div><div class="badge">משוב</div></div><div class="content"><div class="question"><div class="label">הנחיה</div><div class="q">${c.q}</div></div><div class="box"><table class="rubric"><tr><th>קריטריון</th><th>ציון 1–5</th></tr><tr><td>ידע מקצועי</td><td></td></tr><tr><td>סדר וארגון</td><td></td></tr><tr><td>ביטחון ודיבור ברור</td><td></td></tr><tr><td>שימוש במונחים</td><td></td></tr><tr><td>חיבור לפרויקט</td><td></td></tr><tr><td>עמידה בשאלות המשך</td><td></td></tr></table><div class="box tip" style="margin-top:16px"><b>עצה:</b> ${c.advice}</div></div></div>${nav()}</div></section>`;
 if(c.type==='cover') return `<section class="slide"><div class="panel"><div class="top"><div><h1>${c.title}</h1><div class="subtitle">${c.sub}</div></div><div class="badge">פעילות כיתתית</div></div><div class="content cover"><div class="question center"><div class="q">${c.q}</div><div class="chips"><span class="chip">תשובה</span><span class="chip">שאלת המשך</span><span class="chip">משוב</span><span class="chip">שיפור</span></div></div><div class="box tip"><h3>איך מפעילים?</h3><ul>${c.tips.map(x=>`<li>${x}</li>`).join('')}</ul><p class="note"><b>טיפ:</b> ${c.advice}</p></div></div>${nav()}</div></section>`;
 return `<section class="slide"><div class="panel"><div class="top"><div><h2>${c.title}</h2><div class="subtitle">כרטיסיית סימולציה למבחן מגן</div></div><div class="timer">⏱ 90 שניות</div></div><div class="content"><div class="question"><div class="label">שאלת בוחן</div><div class="q">${c.q}</div></div><div><div class="box"><h3>נקודות שחייבות להופיע בתשובה</h3><ul>${(c.points||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="box tip hidden" id="tip-${i}" style="margin-top:16px"><h3>דגשים ועצות למענה</h3><p class="note">${c.advice}</p></div></div></div><div class="actions"><div class="btns"><button class="primary" onclick="toggleTip(${i})">הצג / הסתר דגשים</button><button onclick="askFollowup(${i})">שאלת המשך</button></div><div class="progress"></div><div class="btns"><button onclick="prev()">→ קודם</button><button onclick="next()">הבא ←</button></div></div></div></section>`;
}
function nav(){return `<div class="actions"><div class="btns"><button onclick="prev()">→ קודם</button><button class="primary" onclick="next()">הבא ←</button></div><div class="progress"></div><div class="small">ניווט במקלדת: <span class="kbd">←</span> <span class="kbd">→</span> | מסך מלא: F11</div></div>`}
function show(n){document.querySelectorAll('.slide')[idx].classList.remove('active');idx=(n+cards.length)%cards.length;document.querySelectorAll('.slide')[idx].classList.add('active');updateProgress()}
function next(){show(idx+1)} function prev(){show(idx-1)}
function updateProgress(){document.querySelectorAll('.progress').forEach(p=>p.textContent=`שקף ${idx+1} מתוך ${cards.length}`)}
function toggleTip(i){const el=document.getElementById(`tip-${i}`); if(el) el.classList.toggle('hidden')}
const followups=[
'איפה זה מופיע בקוד שלך?', 'מה החיסרון של הפתרון שבחרת?', 'איזה מקרה קצה בדקת?', 'מה יקרה אם משתמש זדוני ינסה לנצל זאת?', 'איך היית משפר את זה בגרסה הבאה?', 'מה האלטרנטיבה הטכנולוגית ולמה לא בחרת בה?'
];
function askFollowup(i){alert('שאלת המשך לבוחן:\n\n' + followups[i % followups.length]);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')prev(); if(e.key==='ArrowLeft')next(); if(e.key===' ') {e.preventDefault(); const b=document.querySelector('.slide.active .primary'); if(b)b.click();}});
render();
</script>
</body>
</html>
