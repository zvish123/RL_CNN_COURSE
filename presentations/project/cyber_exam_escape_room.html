
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --c1:#00e5ff;--c2:#39ff14;--c3:#ff6b35;--c4:#b347ff;--c5:#ffd600;
    --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--border:#1e3a5f;
    --txt:#c8d8f0;--dim:#5a7a9a;
    --font-mono:'Share Tech Mono',monospace;
    --font-body:'Exo 2',sans-serif;
  }
  body,html{background:var(--bg);color:var(--txt)}
  #root{font-family:var(--font-body);padding:0;min-height:600px;background:var(--bg);position:relative;overflow:hidden}
  #root::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(0,229,255,.025) 30px,rgba(0,229,255,.025) 31px),repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(0,229,255,.025) 30px,rgba(0,229,255,.025) 31px);pointer-events:none;z-index:0}
  .screen{position:relative;z-index:1;min-height:600px;display:flex;flex-direction:column}
  .header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;border-bottom:1px solid var(--border);background:rgba(10,14,26,.9)}
  .logo{font-family:var(--font-mono);font-size:13px;color:var(--c1);letter-spacing:2px}
  .timer-box{font-family:var(--font-mono);font-size:13px;display:flex;gap:12px;align-items:center}
  .timer-val{color:var(--c2);font-size:16px;font-weight:700}
  .score-val{color:var(--c5);font-size:14px}
  .zones{display:flex;gap:0;border-bottom:1px solid var(--border)}
  .zone-btn{flex:1;padding:8px 4px;font-family:var(--font-mono);font-size:10px;letter-spacing:.5px;border:none;cursor:pointer;background:var(--bg2);color:var(--dim);border-right:1px solid var(--border);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
  .zone-btn:last-child{border-right:none}
  .zone-btn.active{background:var(--bg3);color:var(--c1);border-bottom:2px solid var(--c1)}
  .zone-btn.done{color:var(--c2)}
  .zone-btn.locked{opacity:.4;cursor:not-allowed}
  .zone-icon{font-size:14px}
  .zone-name{font-size:9px}
  .main{flex:1;padding:18px 20px;overflow-y:auto}
  .zone-header{margin-bottom:16px}
  .zone-title{font-family:var(--font-mono);font-size:18px;color:var(--c1);margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .zone-sub{font-size:12px;color:var(--dim)}
  .progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--c1),var(--c4));border-radius:2px;transition:width .4s}
  .q-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px}
  .q-num{font-family:var(--font-mono);font-size:10px;color:var(--dim);margin-bottom:6px}
  .q-text{font-size:14px;color:var(--txt);line-height:1.55;margin-bottom:12px}
  .q-text code{font-family:var(--font-mono);background:rgba(0,229,255,.08);padding:1px 5px;border-radius:3px;font-size:12px;color:var(--c1)}
  .opts{display:flex;flex-direction:column;gap:7px}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;color:var(--txt);background:transparent;text-align:right;transition:all .15s;font-family:var(--font-body);line-height:1.4;direction:rtl}
  .opt:hover:not(.disabled){border-color:var(--c1);background:rgba(0,229,255,.05)}
  .opt.correct{border-color:var(--c2);background:rgba(57,255,20,.08);color:var(--c2)}
  .opt.wrong{border-color:var(--c3);background:rgba(255,107,53,.08);color:var(--c3)}
  .opt.disabled{cursor:default}
  .opt-key{font-family:var(--font-mono);font-size:10px;padding:1px 6px;border:1px solid currentColor;border-radius:3px;min-width:22px;text-align:center;opacity:.7;flex-shrink:0}
  .explain{margin-top:10px;padding:10px 12px;background:rgba(179,71,255,.07);border:1px solid rgba(179,71,255,.3);border-radius:6px;font-size:12px;color:#c9a0f0;line-height:1.5;direction:rtl;text-align:right}
  .next-btn{margin-top:14px;padding:9px 20px;border:1px solid var(--c1);background:transparent;color:var(--c1);font-family:var(--font-mono);font-size:12px;border-radius:5px;cursor:pointer;letter-spacing:1px;transition:all .2s}
  .next-btn:hover{background:rgba(0,229,255,.1)}
  .zone-complete{text-align:center;padding:30px 20px;direction:rtl}
  .complete-icon{font-size:40px;margin-bottom:10px}
  .complete-title{font-family:var(--font-mono);font-size:20px;color:var(--c2);margin-bottom:8px}
  .complete-sub{font-size:13px;color:var(--dim);margin-bottom:20px}
  .unlock-btn{padding:11px 28px;border:1px solid var(--c2);background:transparent;color:var(--c2);font-family:var(--font-mono);font-size:12px;border-radius:5px;cursor:pointer;letter-spacing:1px;transition:all .2s}
  .unlock-btn:hover{background:rgba(57,255,20,.1)}
  .final-screen{text-align:center;padding:40px 20px;direction:rtl}
  .final-title{font-family:var(--font-mono);font-size:22px;color:var(--c5);margin-bottom:10px}
  .final-score{font-family:var(--font-mono);font-size:40px;color:var(--c2);margin:10px 0}
  .final-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0;text-align:right}
  .final-item{background:var(--bg2);border:1px solid var(--border);padding:10px 14px;border-radius:7px;font-size:13px}
  .final-item .label{font-size:11px;color:var(--dim);margin-bottom:3px}
  .final-item .val{font-family:var(--font-mono);color:var(--c1)}
  .restart-btn{padding:11px 28px;border:1px solid var(--c5);background:transparent;color:var(--c5);font-family:var(--font-mono);font-size:12px;border-radius:5px;cursor:pointer;letter-spacing:1px;transition:all .2s;margin-top:10px}
  .restart-btn:hover{background:rgba(255,214,0,.1)}
  .intro-screen{text-align:center;padding:30px 20px;direction:rtl}
  .intro-ascii{font-family:var(--font-mono);font-size:10px;color:var(--c1);line-height:1.3;margin-bottom:16px;opacity:.7}
  .intro-title{font-family:var(--font-mono);font-size:22px;color:var(--c1);margin-bottom:8px}
  .intro-sub{font-size:14px;color:var(--txt);max-width:500px;margin:0 auto 20px;line-height:1.6}
  .zones-preview{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
  .zp{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:12px;font-family:var(--font-mono);color:var(--dim)}
  .start-btn{padding:12px 32px;border:2px solid var(--c1);background:transparent;color:var(--c1);font-family:var(--font-mono);font-size:14px;border-radius:6px;cursor:pointer;letter-spacing:2px;transition:all .2s;display:inline-block}
  .start-btn:hover{background:rgba(0,229,255,.1);box-shadow:0 0 20px rgba(0,229,255,.2)}
  .tag-correct{background:rgba(57,255,20,.15);color:var(--c2);padding:2px 8px;border-radius:3px;font-family:var(--font-mono);font-size:10px}
  .tag-wrong{background:rgba(255,107,53,.15);color:var(--c3);padding:2px 8px;border-radius:3px;font-family:var(--font-mono);font-size:10px}
</style>
<h2 class="sr-only">משחק הכנה למבחן מגן - סייבר י"ב: ענה על שאלות בחמישה תחומים כדי "לפרוץ" כל שכבה</h2>
<div id="root"><div class="screen" id="app"></div></div>
<script>
const ZONES=[
  {id:'net',name:'תקשורת',icon:'📡',color:'var(--c1)',
   questions:[
    {q:'איזה קוד Python יוצר סוקט UDP?',opts:['socket(AF_INET, SOCK_DGRAM)','socket(AF_INET, SOCK_STREAM)','socket(AF_UNIX, SOCK_DGRAM)','socket(AF_INET6, SOCK_DGRAM)'],ans:0,explain:'SOCK_DGRAM = UDP, SOCK_STREAM = TCP. AF_INET מציין IPv4.'},
    {q:'מהי הטענה שגויה לגבי פרוטוקול IP?',opts:['IP הוא פרוטוקול שכבת הרשת','IP מבטיח הגעת מנות (reliable)','TTL מונע לולאות נצחיות','IPv6 כולל 128 סיביות'],ans:1,explain:'IP הוא Connectionless ו-Unreliable. הוא אינו מבטיח הגעת מנות — זה תפקיד TCP בשכבת התעבורה.'},
    {q:'מה מייצגת ה-Sequence Number ב-TCP three-way handshake?',opts:['מספר הפורט של השרת','מספר אקראי (ISN) להגנה מפני ניחוש וערבוב שיחות','כתובת ה-IP של המקור','אורך החבילה בבתים'],ans:1,explain:'ה-ISN (Initial Sequence Number) הוא מספר אקראי. הוא לא מתחיל ב-0 כדי למנוע ניחוש ע"י תוקף וערבוב של שתי שיחות מקביליות.'},
    {q:'פורט 443 שייך לאיזה פרוטוקול?',opts:['HTTP','FTP','HTTPS','SMTP'],ans:2,explain:'HTTPS (HTTP מוצפן ב-TLS) עובד על פורט 443. HTTP הרגיל עובד על פורט 80.'},
    {q:'מה תפקיד פרוטוקול ARP?',opts:['תרגום שם דומיין לכתובת IP','הקצאת כתובות IP דינמיות','איתור כתובת MAC לפי כתובת IP','ניתוב מנות בין רשתות'],ans:2,explain:'ARP (Address Resolution Protocol) מאתר כתובת MAC של תחנה ברשת לפי כתובת IP שלה — פועל בשכבת ה-Data Link.'},
   ]
  },
  {id:'crypto',name:'קריפטו',icon:'🔐',color:'var(--c4)',
   questions:[
    {q:'הצפנה סימטרית שונה מאסימטרית בכך ש...',opts:['סימטרית מהירה יותר, משתמשת באותו מפתח להצפנה ופענוח','אסימטרית מהירה יותר, ומשתמשת במפתח אחד','סימטרית לא בטוחה כלל','אסימטרית דורשת מפתח משותף מראש'],ans:0,explain:'הצפנה סימטרית (כמו AES) מהירה ומשתמשת במפתח אחד. אסימטרית (RSA) משתמשת בזוג מפתחות ציבורי-פרטי — איטית יותר אך פותרת בעיית חלוקת מפתחות.'},
    {q:'מהו הפלט של פונקציית MD5?',opts:['256 סיביות','512 סיביות','128 סיביות','64 סיביות'],ans:2,explain:'MD5 מפיק תמצית (digest) באורך קבוע של 128 סיביות, המיוצגת לרוב כ-32 תווים הקסדצימליים.'},
    {q:'מה מאפשר פרוטוקול Diffie-Hellman?',opts:['הצפנת הודעות ב-AES','חלוקת מפתח סודי על ערוץ פתוח ללא מפגש מוקדם','אימות זהות המשתמש','חתימה דיגיטלית על מסמך'],ans:1,explain:'DH פותר את "בעיית הפצת המפתחות" — שני צדדים שמעולם לא נפגשו יכולים לגזור מפתח סודי משותף מעל ערוץ ציבורי לא מאובטח.'},
    {q:'Fernet מבסיס על...',opts:['RSA-2048 + SHA-512','AES-128-CBC + HMAC-SHA256','DES + MD5','AES-256-GCM בלבד'],ans:1,explain:'Fernet משלב AES-128-CBC להצפנה ו-HMAC-SHA256 לאימות שלמות. שילוב זה מבטיח שכל שינוי בטוקן יזוהה ויגרום לשגיאה.'},
    {q:'מה הופך חתימה דיגיטלית לתקפה?',opts:['הצפנה ב-AES של המסמך','שימוש במפתח הפרטי לחתימה, אימות במפתח ציבורי','שמירת ה-hash בשרת מרכזי','שימוש בסיסמה חזקה מעל 12 תווים'],ans:1,explain:'החותם מחתים עם מפתח פרטי (סודי). כל אחד יכול לאמת עם המפתח הציבורי. זו הגדרת Verify: pk+m+σ → 1 אם תקף.'},
   ]
  },
  {id:'os',name:'מ"ה',icon:'⚙️',color:'var(--c3)',
   questions:[
    {q:'מה ההבדל העיקרי בין Thread ל-Process?',opts:['Thread הוא תוכנית מלאה, Process הוא רק חלק ממנה','Threads בתוך אותו Process חולקים מרחב כתובות; Processes לא','Process מהיר יותר להפעלה מ-Thread','Thread אינו יכול לגשת לרשת'],ans:1,explain:'Threads בתוך Process אחד חולקים זיכרון, קבצים פתוחים והרשאות. החלפת הקשר בין Threads מהירה יותר. בין Processes הזיכרון מבודד.'},
    {q:'מהו "תהליך זומבי"?',opts:['תהליך שצורך 100% מהמעבד','תהליך שסיים פעולתו אך עדיין בטבלת התהליכים כי האב לא קרא ערך היציאה','תהליך נגוע בנוזקה','תהליך שנמצא ב-Deadlock'],ans:1,explain:'Zombie Process = תהליך שסיים, מחזיר Exit Status, אך נשאר בטבלה עד שה-Parent יקרא את ה-wait(). לא צורך CPU, רק רשומה בטבלה.'},
    {q:'מהו Deadlock?',opts:['מצב שבו Thread אחד מריץ לולאה אינסופית','מצב שבו שני תהליכים נועלים משאבים שהשני מחכה להם ולא מתקדמים לעולם','הצפת המחסנית מעבר לגבולה','כשל בהחלפת הקשר בין Threads'],ans:1,explain:'Deadlock: Thread A מחזיק משאב X ומחכה ל-Y. Thread B מחזיק Y ומחכה ל-X. שניהם חסומים לנצח. פתרון: ordering של נעילות, Timeout.'},
    {q:'IPC עומד על...',opts:['Internet Protocol Communication','Inter-Process Communication','Internal Process Control','Interrupt Processing Cycle'],ans:1,explain:'IPC (Inter-Process Communication) = מנגנונים לתקשורת ושיתוף מידע בין תהליכים: Pipes, Sockets, Shared Memory, Message Queue, Mutex, Semaphore.'},
   ]
  },
  {id:'cyber',name:'סייבר',icon:'🛡️',color:'var(--c5)',
   questions:[
    {q:'מהי מתקפת SQL Injection?',opts:['הצפת השרת בבקשות HTTP','הזרקת קוד SQL לשדה קלט כדי לשנות שאילתה','ניצול חולשה בפרוטוקול TLS','גניבת עוגיות Session'],ans:1,explain:'SQL Injection: המשתמש מכניס קוד SQL לשדה קלט. הגנה: Parameterized Queries / ORM (SQLAlchemy מגן כברירת מחדל).'},
    {q:'מה ההבדל בין DoS ל-DDoS?',opts:['DoS מהיר יותר מ-DDoS','DoS ממחשב יחיד, DDoS ממספר מחשבים מסונכרנים','DDoS מתמקד בשכבת האפליקציה בלבד','אין הבדל מהותי'],ans:1,explain:'DoS = מקור אחד. DDoS = botnet — מאות/אלפי מחשבים נגועים ב-malware שמציפים את המטרה מכיוונים שונים.'},
    {q:'MITM attack — איזו הגנה הכי אפקטיבית?',opts:['הגדלת bandwidth','TLS + אימות תעודת שרת (Certificate Pinning)','שימוש ב-UDP במקום TCP','הפעלת Firewall בלבד'],ans:1,explain:'TLS מצפין את התקשורת. Certificate Pinning מוודא שהתעודה אותנטית. JWT חתום — גם אם מיורט, לא ניתן לזייף ללא המפתח הסודי.'},
    {q:'Buffer Overflow מנוצל כדי...',opts:['לעייף את ה-CPU בחישובים','לגרום לתוכנה לבצע קוד זדוני שלא תוכנן','לגנוב מפתחות הצפנה','לשבש פרוטוקול TCP'],ans:1,explain:'כתיבה מעבר לגבולות ה-buffer דורסת את כתובת החזרה של הפונקציה, מאפשרת לתוקף להפנות ביצוע לקוד זדוני שהכניס לזיכרון.'},
   ]
  },
  {id:'db',name:'DB & Flask',icon:'🗄️',color:'var(--c2)',
   questions:[
    {q:'מהי הפקודה ליצירת טבלה ב-SQL?',opts:['CREATE TABLE','INSERT TABLE','DEFINE TABLE','MAKE TABLE'],ans:0,explain:'CREATE TABLE שייכת ל-DDL (Data Definition Language). INSERT/UPDATE/DELETE הן DML (Data Manipulation Language).'},
    {q:'יתרון מרכזי של ORM (כמו SQLAlchemy)...',opts:['מהירות גבוהה יותר מ-SQL ידני תמיד','הגנה מובנית מ-SQL Injection דרך Parameterized Queries','דורש ידע אפס ב-SQL','עובד רק עם SQLite'],ans:1,explain:'ORM משתמש ב-Parameterized Queries אוטומטית — כלומר מפריד בין הקוד לנתונים, ומונע SQL Injection כברירת מחדל.'},
    {q:'מהו Flask?',opts:['Full-stack Framework כבד כמו Django','Micro-Framework לפיתוח Web ב-Python המבוסס על Werkzeug ו-Jinja2','ספריית UI לבניית ממשקים גרפיים','מנוע מסד נתונים מובנה'],ans:1,explain:'Flask הוא Micro-Framework — קל, גמיש, לא כופה מבנה. מבוסס על Werkzeug (WSGI) ו-Jinja2 (templates). Route = @app.route().'},
    {q:'מה ההבדל בין JWT ל-Session מסורתי?',opts:['JWT מהיר יותר רק עקב גודל קטן יותר','JWT הוא Stateless — השרת לא שומר מידע; מתאים ל-Microservices','Session יותר מאובטח תמיד','JWT דורש DB lookup בכל בקשה'],ans:1,explain:'JWT = Stateless: השרת מאמת את החתימה בלי DB. Session = השרת שומר state. JWT מתאים ל-API מבוזר ו-Microservices שונים.'},
   ]
  }
];

const S={
  screen:'intro',
  zone:0,
  q:0,
  selected:null,
  answered:false,
  score:0,
  correct:0,
  total:0,
  zonesComplete:Array(5).fill(false),
  startTime:null,
  elapsed:0,
  timerInterval:null
};

function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60}

function getEl(id){return document.getElementById(id)}
function qs(sel){return document.querySelector(sel)}

function render(){
  const app=qs('#app');
  if(S.screen==='intro'){app.innerHTML=introHTML();return}
  if(S.screen==='final'){app.innerHTML=finalHTML();return}
  const zone=ZONES[S.zone];
  const qs_arr=zone.questions;
  const q=qs_arr[S.q];
  const prog=(S.q/qs_arr.length)*100;
  const done=S.zonesComplete[S.zone];

  app.innerHTML=`
    <div class="header">
      <div class="logo">[ CYBER_EXAM_v2.0 ]</div>
      <div class="timer-box">
        <span style="color:var(--dim);font-size:11px">SCORE</span>
        <span class="score-val">${S.score}</span>
        <span style="color:var(--dim);font-size:11px">TIME</span>
        <span class="timer-val" id="timer-el">${fmt(S.elapsed)}</span>
      </div>
    </div>
    <div class="zones">
      ${ZONES.map((z,i)=>`
        <button class="zone-btn ${i===S.zone?'active':''} ${S.zonesComplete[i]?'done':''} ${i>S.zone&&!S.zonesComplete[i-1]&&i>0?'locked':''}"
          onclick="switchZone(${i})" style="${i===S.zone?'border-bottom-color:'+z.color:''}">
          <span class="zone-icon">${S.zonesComplete[i]?'✅':z.icon}</span>
          <span class="zone-name">${z.name}</span>
        </button>`).join('')}
    </div>
    <div class="main">
      ${done ? zoneDoneHTML(S.zone) : `
      <div class="zone-header">
        <div class="zone-title" style="color:${zone.color}">${zone.icon} ${zone.name}</div>
        <div class="zone-sub">שאלה ${S.q+1} מתוך ${qs_arr.length}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:linear-gradient(90deg,${zone.color},var(--c4))"></div></div>
      <div class="q-card">
        <div class="q-num">// Q${S.q+1}</div>
        <div class="q-text" dir="rtl">${q.q}</div>
        <div class="opts" id="opts-container">
          ${q.opts.map((o,i)=>`
            <button class="opt ${S.answered?(i===q.ans?'correct':i===S.selected?'wrong':'disabled'):'disabled'}"
              onclick="${S.answered?'':'selectOpt('+i+')'}"
              style="${!S.answered?'cursor:pointer':''}" dir="rtl">
              <span class="opt-key" style="${S.answered&&i===q.ans?'color:var(--c2)':S.answered&&i===S.selected&&i!==q.ans?'color:var(--c3)':''}">${String.fromCharCode(65+i)}</span>
              ${o}
            </button>`).join('')}
        </div>
        ${S.answered?`
          <div class="explain" dir="rtl">
            ${S.selected===q.ans?'<span class="tag-correct">✓ נכון</span>':'<span class="tag-wrong">✗ שגוי</span>'}
            &nbsp; ${q.explain}
          </div>
          <button class="next-btn" onclick="nextQ()" dir="rtl">${S.q<qs_arr.length-1?'שאלה הבאה ←':'סיים תחנה ←'}</button>
        `:''}
      </div>`}
    </div>`;
}

function introHTML(){return `
  <div class="screen">
    <div class="main intro-screen">
      <div class="intro-ascii">╔════════════════════════════╗<br>║  CYBER EXAM PREP v2.0      ║<br>║  5 ZONES · BREACH TO PASS  ║<br>╚════════════════════════════╝</div>
      <div class="intro-title">מבחן המגן — סימולטור</div>
      <div class="intro-sub">ענה על שאלות בחמש תחנות כדי "לפרוץ" כל שכבה. כל תשובה נכונה = 20 נקודות. קרא ההסבר אחרי כל שאלה.</div>
      <div class="zones-preview">
        ${ZONES.map(z=>`<div class="zp">${z.icon} ${z.name}</div>`).join('')}
      </div>
      <button class="start-btn" onclick="startGame()">[ START_SESSION ]</button>
    </div>
  </div>`}

function zoneDoneHTML(i){const z=ZONES[i];return`
  <div class="zone-complete">
    <div class="complete-icon">🔓</div>
    <div class="complete-title" style="color:${z.color}">תחנת ${z.name} — נפרצה!</div>
    <div class="complete-sub">כל השאלות נענו. בחר בתחנה הבאה מלמעלה.</div>
    ${S.zonesComplete.every(Boolean)?`<button class="unlock-btn" onclick="showFinal()">הצג תוצאות סופיות →</button>`:''}
  </div>`}

function finalHTML(){
  const zones_done=S.zonesComplete.filter(Boolean).length;
  const pct=Math.round((S.correct/S.total)*100);
  return`<div class="screen"><div class="main final-screen">
    <div style="font-family:var(--font-mono);font-size:12px;color:var(--dim);margin-bottom:8px">SESSION_COMPLETE</div>
    <div class="final-title">// ניתוח ביצועים</div>
    <div class="final-score">${S.score}</div>
    <div style="font-size:13px;color:var(--dim)">נקודות</div>
    <div class="final-grid">
      <div class="final-item"><div class="label">תשובות נכונות</div><div class="val">${S.correct} / ${S.total}</div></div>
      <div class="final-item"><div class="label">אחוז הצלחה</div><div class="val">${pct}%</div></div>
      <div class="final-item"><div class="label">תחנות שנפרצו</div><div class="val">${zones_done} / ${ZONES.length}</div></div>
      <div class="final-item"><div class="label">זמן כולל</div><div class="val">${fmt(S.elapsed)}</div></div>
    </div>
    <div style="font-size:13px;color:${pct>=80?'var(--c2)':pct>=60?'var(--c5)':'var(--c3)'};margin:10px 0;font-family:var(--font-mono)">
      ${pct>=80?'[ ACCESS_GRANTED ] מוכן למבחן המגן!':pct>=60?'[ PARTIAL_ACCESS ] כדאי לחזור על הנושאים החלשים':'[ ACCESS_DENIED ] נדרשת חזרה מעמיקה'}
    </div>
    <button class="restart-btn" onclick="restart()">[ RESTART_SESSION ]</button>
  </div></div>`}

function startGame(){
  S.screen='game';S.startTime=Date.now();
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(()=>{
    S.elapsed=Math.floor((Date.now()-S.startTime)/1000);
    const el=getEl('timer-el');if(el)el.textContent=fmt(S.elapsed);
  },1000);
  render();
}

function selectOpt(i){
  if(S.answered)return;
  S.selected=i;S.answered=true;S.total++;
  const zone=ZONES[S.zone];const q=zone.questions[S.q];
  if(i===q.ans){S.score+=20;S.correct++}
  render();
}

function nextQ(){
  const zone=ZONES[S.zone];
  if(S.q<zone.questions.length-1){S.q++;S.selected=null;S.answered=false;render()}
  else{S.zonesComplete[S.zone]=true;S.selected=null;S.answered=false;render()}
}

function switchZone(i){
  if(i>0&&!S.zonesComplete[i-1])return;
  S.zone=i;S.q=0;S.selected=null;S.answered=false;render();
}

function showFinal(){
  clearInterval(S.timerInterval);S.screen='final';render();
}

function restart(){
  clearInterval(S.timerInterval);
  Object.assign(S,{screen:'intro',zone:0,q:0,selected:null,answered:false,score:0,correct:0,total:0,zonesComplete:Array(5).fill(false),elapsed:0});
  render();
}

render();
</script>
