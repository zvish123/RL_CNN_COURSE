<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מבחן הבנת קוד: בינה מלאכותית וסייבר</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: #161e31;
            --text: #e2e8f0;
            --accent: #00f2ff;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { max-width: 850px; margin: 0 auto; }

        h1 {
            text-align: center;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 15px;
        }

        .quiz-card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #2d3748;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option {
            background: #1f2937;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #374151;
            transition: all 0.2s;
        }

        .option:hover { background: #374151; border-color: var(--accent); }

        .option.selected { background: #334155; border-color: var(--accent); }

        .option.correct { background: var(--correct) !important; color: white; border-color: var(--correct); }

        .option.wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong); }

        .feedback {
            margin-top: 15px;
            padding: 10px;
            border-right: 4px solid var(--accent);
            background: #1e293b;
            display: none;
            font-size: 0.95rem;
        }

        #submit-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 30px;
            transition: opacity 0.2s;
        }

        #result-display {
            text-align: center;
            font-size: 2rem;
            margin-top: 40px;
            color: var(--accent);
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 XO AI: Code Logic Challenge</h1>
    <div id="quiz-container"></div>
    <div id="result-display"></div>
    <button id="submit-btn" onclick="checkAnswers()">הגש מבחן ובדוק תוצאות</button>
</div>

<script>
    const questions = [
        {
            q: "מהי המטרה העיקרית של מחלקת XOTournament בקובץ tournament.py?",
            options: [
                "בניית ממשק גרפי מתקדם עבור שחקנים אנושיים",
                "הרצת סבבי משחקים רבים לצורך אימון ואיסוף נתונים",
                "מחיקת היסטוריית המשחקים הישנה מהזיכרון המקומי",
                "הצפנת נתוני השחקנים כדי למנוע פריצות למערכת"
            ],
            correct: 1,
            hint: "הטורניר נועד לאפשר ל-AI ללמוד דרך ניסוי וטעייה בכמויות גדולות."
        },
        {
            q: "מה ההבדל המרכזי בין make_random_move ל-make_smart_move?",
            options: [
                "אחד מיועד לשחקן הראשון והשני מיועד לשחקן השני",
                "אחד מהיר יותר בביצוע והשני דורש יותר זמן מעבד",
                "הראשון בוחר באקראי והשני משתמש במילון הלמידה",
                "הראשון תמיד מנצח והשני נועד רק לאימוני מתחילים"
            ],
            correct: 2,
            hint: "חפשו בקוד היכן מבוצעת הפנייה ל-learning_dict לחישוב הצעד."
        },
        {
            q: "כיצד משפיע הפרמטר gamma על תהליך הלמידה של הסוכן?",
            options: [
                "הוא קובע את עוצמת הצבעים של הלוח בזמן ההדפסה",
                "הוא מגדיר את כמות המהלכים המקסימלית בכל משחק",
                "הוא משמש כמשתנה עזר לספירת כמות הניצחונות של X",
                "הוא קובע כמה משקל יינתן לתוצאה הסופית בצעדים קודמים"
            ],
            correct: 3,
            hint: "גמא הוא ה-Discount Factor באלגוריתמים של למידת מכונה."
        },
        {
            q: "מה יקרה אם נשנה את ה-current_score ל-1.0 במקרה של הפסד?",
            options: [
                "ה-AI יפרש הפסד כהצלחה וילמד להפסיד בכוונה בכל משחק",
                "המערכת תזהה שגיאה לוגית ותפסיק את האימון באופן אוטומטי",
                "לא יחול שום שינוי בביצועים כי הציון הוא רק לצורכי סטטיסטיקה",
                "זמן האימון יתקצר משמעותית כי ה-AI יבין את החוקים מהר יותר"
            ],
            correct: 0,
            hint: "הסוכן תמיד מנסה למקסם את הציון (Score) שהוא מקבל מהסביבה."
        },
        {
            q: "מדוע הקוד עובר על היסטוריית המהלכים בסדר הפוך (reversed)?",
            options: [
                "כדי לחסוך במקום בזיכרון ה-RAM של המחשב בזמן הריצה",
                "כדי לעדכן את המהלכים שהובילו לניצחון מהסוף להתחלה",
                "מכיוון ששפת פייתון אינה מאפשרת קריאת רשימות מההתחלה",
                "כדי לוודא שהמהלך הראשון במשחק יהיה תמיד המהלך החזק ביותר"
            ],
            correct: 1,
            hint: "התוצאה (ניצחון/הפסד) ידועה רק בסוף, לכן חוזרים אחורה לעדכן את המהלכים."
        },
        {
            q: "מה תפקיד הבלוק try-except בתוך לולאת התפריט ב-main.py?",
            options: [
                "הצפנת נתוני הקלט של המשתמש לפני השמירה לקובץ ה-JSON",
                "שיפור מהירות התגובה של התפריט במעבר בין האפשרויות",
                "מניעת קריסת התוכנית במקרה שהמשתמש מזין קלט שאינו מספר",
                "בדיקה האם קובצי ה-AI קיימים בתיקייה לפני תחילת המשחק"
            ],
            correct: 2,
            hint: "זהו מנגנון הגנה מפני שגיאות זמן ריצה (Runtime Errors) של המשתמש."
        },
        {
            q: "מדוע מצב הלוח הופך למחרוזת (String) לפני הכנסתו למילון?",
            options: [
                "כדי שיהיה ניתן להשתמש במצב הלוח כמפתח (Key) במילון",
                "כדי להקטין את גודל קובץ הנתונים שנשמר על גבי הדיסק",
                "כדי לאפשר הצגת הלוח בשפות שונות בצורה פשוטה ומהירה",
                "כדי שה-AI יוכל לקרוא את הנתונים מבלי להשתמש בלולאות"
            ],
            correct: 0,
            hint: "רשימות (Lists) הן Mutable ולכן אינן ניתנות לשימוש כמפתח במילון."
        },
        {
            q: "מהי המטרה המרכזית של שמירת הנתונים בפורמט JSON?",
            options: [
                "הפיכת המשחק לזמין עבור דפדפני אינטרנט ללא צורך בפייתון",
                "שמירת ה'זיכרון' של ה-AI כך שיהיה זמין גם בהרצות הבאות",
                "יצירת עותק גיבוי לקוד המקור למקרה שהקובץ הראשי יימחק",
                "שליחת הנתונים לשרת חיצוני לצורך ניתוח סטטיסטי מעמיק"
            ],
            correct: 1,
            hint: "תהליך זה נקרא Persistence - שמירת מצב התוכנה לאורך זמן."
        },
        {
            q: "מהו המבנה של המשתנה learning_dict המופיע בקוד?",
            options: [
                "רשימה של כל השחקנים שניצחו אי פעם בטורניר לפי סדר",
                "אוסף של פונקציות מתמטיות שמחשבות את המהלך הבא",
                "מילון המקשר בין מצב לוח לרשימת ציונים עבור מהלכים",
                "טבלה המכילה את זמני הריצה של כל פונקציה במערכת"
            ],
            correct: 2,
            hint: "זהו ה'מוח' של הסוכן, הממפה מצבים לפעולות כדאיות."
        },
        {
            q: "מה תפקיד הפונקציה get_available_positions במחלקת המשחק?",
            options: [
                "איפוס הלוח למצב התחלתי לפני שמתחיל משחק חדש בטורניר",
                "בדיקה האם אחד השחקנים הצליח ליצור רצף של שלושה סימנים",
                "חישוב הזמן שנותר לכל שחקן לבצע את המהלך הבא שלו",
                "החזרת רשימת קואורדינטות של כל המשבצות הריקות בלוח"
            ],
            correct: 3,
            hint: "הפונקציה מבטיחה שה-AI לא ינסה לסמן משבצת שכבר תפוסה."
        }
    ];

    let userChoices = new Array(questions.length).fill(null);

    function initQuiz() {
        const container = document.getElementById('quiz-container');
        questions.forEach((q, qIdx) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerHTML = `
                <div class="question-text">${qIdx + 1}. ${q.q}</div>
                <div class="options">
                    ${q.options.map((opt, oIdx) => `
                        <div class="option" onclick="selectOption(${qIdx}, ${oIdx}, this)">${opt}</div>
                    `).join('')}
                </div>
                <div class="feedback" id="fb-${qIdx}">💡 רמז: ${q.hint}</div>
            `;
            container.appendChild(card);
        });
    }

    function selectOption(qIdx, oIdx, el) {
        userChoices[qIdx] = oIdx;
        const opts = el.parentElement.querySelectorAll('.option');
        opts.forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    }

    function checkAnswers() {
        let score = 0;
        questions.forEach((q, i) => {
            const card = document.querySelectorAll('.quiz-card')[i];
            const opts = card.querySelectorAll('.option');
            const fb = document.getElementById(`fb-${i}`);

            fb.style.display = 'block';

            opts.forEach((opt, idx) => {
                opt.classList.remove('correct', 'wrong');
                if (idx === q.correct) opt.classList.add('correct');
                else if (idx === userChoices[i]) opt.classList.add('wrong');
            });

            if (userChoices[i] === q.correct) score++;
        });

        const res = document.getElementById('result-display');
        res.style.display = 'block';
        const finalScore = Math.round((score / questions.length) * 100);
        res.innerHTML = `ציון סופי: ${finalScore}% (${score}/${questions.length})`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    initQuiz();
</script>
</body>
</html>
