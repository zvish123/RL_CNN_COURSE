<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טענה מול הוכחה — מצגת בסגנון TED</title>
<style>
  :root{
    --bg:#08090c; --panel:#0f1116;
    --accent:#ff5b5b; --accent2:#3ea6ff; --gold:#f5c26b; --green:#5be3a0;
    --text:#f2f3f5; --text-dim:#8b93a0;
  }
  *{box-sizing:border-box;}
  html,body{height:100%; margin:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Segoe UI',Arial,sans-serif; overflow:hidden;
  }
  #deck{position:relative; width:100%; height:100vh;}
  .slide{
    position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:60px 8% 110px;
  }
  .slide.active{display:flex;}
  .kicker{
    color:var(--text-dim); font-size:1em; letter-spacing:3px;
    text-transform:uppercase; margin-bottom:22px;
  }
  .mega{font-size:4.2em; font-weight:800; line-height:1.15; margin:0; letter-spacing:-1px;}
  .mega.small{font-size:2.6em;}
  .sub{font-size:1.4em; color:var(--text-dim); margin-top:22px; max-width:780px; line-height:1.6;}
  .accent-red{color:var(--accent);}
  .accent-blue{color:var(--accent2);}
  .accent-gold{color:var(--gold);}
  .accent-green{color:var(--green);}
  .quote{
    font-size:2.1em; font-weight:600; line-height:1.5; max-width:820px;
    position:relative; padding:0 20px;
  }
  .quote::before{content:'"'; color:var(--accent); font-size:1.4em; opacity:0.5;}
  .quote::after{content:'"'; color:var(--accent); font-size:1.4em; opacity:0.5;}
  .two-split{display:flex; gap:60px; width:100%; max-width:1000px; justify-content:center; flex-wrap:wrap;}
  .split-card{flex:1; min-width:260px; text-align:right; background:var(--panel); border-radius:16px; padding:34px 30px; border:1px solid #1c2028;}
  .split-card h3{margin:0 0 14px; font-size:1.5em;}
  .split-card p{font-size:1.15em; line-height:1.7; color:var(--text-dim); margin:0;}
  .split-card.claim{border-top:4px solid var(--accent);}
  .split-card.evidence{border-top:4px solid var(--green);}
  .story-tag{
    position:absolute; top:40px; right:50%; transform:translateX(50%);
    background:#1c1420; color:#d9a6ff; padding:6px 20px; border-radius:20px;
    font-size:0.95em; letter-spacing:1px;
  }
  .steps{display:flex; flex-direction:column; gap:22px; max-width:680px; width:100%; text-align:right;}
  .step{display:flex; align-items:flex-start; gap:20px; background:var(--panel); border-radius:14px; padding:22px 28px;}
  .step-num{
    flex-shrink:0; width:46px; height:46px; border-radius:50%; background:var(--accent2);
    color:#04101c; font-weight:800; font-size:1.3em; display:flex; align-items:center; justify-content:center;
  }
  .step p{margin:0; font-size:1.15em; line-height:1.6;}
  .examples-row{display:flex; gap:24px; flex-wrap:wrap; justify-content:center; max-width:1000px;}
  .ex-card{
    background:var(--panel); border-radius:14px; padding:26px 24px; width:260px; text-align:right;
    border:1px solid #1c2028;
  }
  .ex-card .icon{font-size:2em; margin-bottom:10px; display:block; text-align:center;}
  .ex-card h4{margin:0 0 8px; font-size:1.15em;}
  .ex-card p{margin:0; font-size:0.98em; color:var(--text-dim); line-height:1.6;}
  .markers{display:flex; flex-direction:column; gap:16px; max-width:700px; text-align:right; width:100%;}
  .marker{display:flex; align-items:center; gap:14px; font-size:1.2em;}
  .marker .check{color:var(--green); font-size:1.3em;}

  #nav-bar{
    position:fixed; bottom:0; right:0; left:0; height:64px;
    background:var(--panel); border-top:1px solid #1c2028;
    display:flex; align-items:center; justify-content:space-between; padding:0 5%; z-index:10;
  }
  .nav-btn{
    background:#181c24; color:var(--text); border:1px solid #262b35;
    padding:10px 22px; border-radius:8px; cursor:pointer; font-size:1em;
  }
  .nav-btn:hover{border-color:var(--accent2);}
  .nav-btn:disabled{opacity:0.3; cursor:default;}
  #slide-counter{color:var(--text-dim); font-family:monospace;}
  #dots{display:flex; gap:6px;}
  .dot{width:8px; height:8px; border-radius:50%; background:#262b35; cursor:pointer;}
  .dot.active{background:var(--accent2);}
</style>
</head>
<body>

<div id="deck"></div>

<div id="nav-bar">
  <button class="nav-btn" id="btn-next">◀ הבא</button>
  <div style="display:flex; align-items:center; gap:16px;">
    <div id="dots"></div>
    <span id="slide-counter"></span>
  </div>
  <button class="nav-btn" id="btn-prev">הקודם ▶</button>
</div>

<script>
const slidesHTML = [

// 0 - Title
`<div class="kicker">מיומנויות AI לתלמידי מחשבים</div>
<h1 class="mega">טענה <span class="accent-red">מול</span> הוכחה</h1>
<p class="sub">איך לומדים לחשוב, לחקור ולפקפק — בעולם שבו כל דבר "עובד" עד שבודקים</p>`,

// 1 - Hook
`<p class="quote">מתי בפעם האחרונה <span class="accent-gold">האמנתם</span> למשהו — רק כי מישהו, או משהו, פשוט <span class="accent-red">אמר</span> את זה?</p>
<p class="sub">בלי לבדוק. בלי לשאול "איך אני יודע?"</p>`,

// 2 - Definition claim vs evidence
`<h2 class="mega small">מה ההבדל?</h2>
<div class="two-split">
  <div class="split-card claim">
    <h3 class="accent-red">טענה</h3>
    <p>מישהו אומר שמשהו קרה, או שמשהו נכון. זה יכול להיות אמת — אבל זה עדיין רק <strong>משפט</strong>, לא עובדה מוכחת.</p>
  </div>
  <div class="split-card evidence">
    <h3 class="accent-green">הוכחה</h3>
    <p>משהו שאתם יכולים <strong>לבדוק בעצמכם</strong> — לראות, למדוד, לשחזר. לא תלוי באמון במי שאמר.</p>
  </div>
</div>`,

// 3 - Tech example
`<h2 class="mega small">דוגמה מהעולם שלנו</h2>
<div class="two-split">
  <div class="split-card claim">
    <h3 class="accent-red">טענה</h3>
    <p>קלוד כותב: <em>"הפעלתי בהצלחה את reviewer-agent."</em></p>
  </div>
  <div class="split-card evidence">
    <h3 class="accent-green">הוכחה</h3>
    <p>בתמלול, בפועל, רואים <code>tool_use</code> עם שם הסוכן — לא רק את המשפט שהוא כתב.</p>
  </div>
</div>`,

// 4 - Story open
`<div class="story-tag">סיפור אמיתי</div>
<h2 class="mega small">הבאג שלא היה שם</h2>
<p class="sub" style="font-size:1.5em; margin-top:40px;">מורה כתב קוד שמריץ סוכן AI. הסוכן שאל שאלה — אבל אי אפשר היה להקליד תשובה. שום דבר. Enter לא עשה כלום.</p>`,

// 5 - First assumption
`<p class="quote">"כנראה יש באג ב-<span class="accent-blue">AI</span>. או שהקוד שלי <span class="accent-red">שגוי</span>."</p>
<p class="sub">זו הייתה ההנחה הראשונה. הנחה טבעית לגמרי.</p>`,

// 6 - The pivotal question
`<h2 class="mega small">אבל הוא לא הסתפק בהנחה</h2>
<p class="quote">"האם זה קורה גם <span class="accent-gold">מטרמינל רגיל</span>, לא מתוך PyCharm?"</p>`,

// 7 - Resolution
`<p class="sub" style="font-size:1.5em;">מהטרמינל — עבד מצוין.</p>
<p class="sub" style="font-size:1.5em;">זה הוביל לחיפוש ממוקד: הבדל בין PyCharm לטרמינל.</p>
<p class="quote" style="margin-top:30px;">התגלית: באג <span class="accent-gold">מתועד</span> ב-PyCharm. <span class="accent-red">אין שום קשר ל-AI.</span></p>`,

// 8 - The lesson
`<p class="quote">הסקרנות לא הייתה <span class="accent-red">"לשאול הרבה שאלות."</span></p>
<p class="quote" style="margin-top:20px;">היא הייתה לשאול <span class="accent-green">שאלה אחת</span> שבודקת בין שתי אפשרויות.</p>`,

// 9 - Technique framework
`<h2 class="mega small">טכניקה ללמידה עצמית</h2>
<div class="steps">
  <div class="step"><div class="step-num">1</div><p>מה בדיוק הייתי צריך <strong>לראות</strong> כדי לדעת שזה נכון?</p></div>
  <div class="step"><div class="step-num">2</div><p>איך אני יכול <strong>לבדוק את זה בעצמי</strong>, לפני ששואלים מישהו אחר?</p></div>
  <div class="step"><div class="step-num">3</div><p>מה היה <strong>נראה אחרת</strong> אם הייתי טועה?</p></div>
</div>`,

// 10 - Sparking curiosity
`<h2 class="mega small">איך מעוררים סקרנות עצמית?</h2>
<div class="markers">
  <div class="marker"><span class="check">✓</span> שאלו "מה עוד יכול להסביר את זה?" — לא רק את ההסבר הראשון שעולה בראש.</div>
  <div class="marker"><span class="check">✓</span> חפשו במפורש מה <strong>יפריך</strong> את מה שאתם חושבים — לא רק מה שיאשר.</div>
  <div class="marker"><span class="check">✓</span> כשמשהו "סתם עובד" — שאלו למה, לא רק "יופי, עובד."</div>
</div>`,

// 11 - Critical thinking markers
`<h2 class="mega small">מהי חשיבה ביקורתית — בפועל?</h2>
<div class="markers">
  <div class="marker"><span class="check">✓</span> להבחין בין "לא מצאתי הוכחה" לבין "זה לא נכון" — אלה לא אותו דבר.</div>
  <div class="marker"><span class="check">✓</span> להשוות בין מקורות סותרים במקום לבחור את הראשון שמצאתם.</div>
  <div class="marker"><span class="check">✓</span> להיות מוכנים להגיד "התיעוד טעה" אם ההרצה בפועל מוכיחה אחרת.</div>
</div>`,

// 12 - Examples across domains
`<h2 class="mega small">זה לא רק בקוד</h2>
<div class="examples-row">
  <div class="ex-card"><span class="icon">📰</span><h4>חדשות</h4><p>כותרת דרמטית = טענה. בדיקת המקור המקורי = הוכחה.</p></div>
  <div class="ex-card"><span class="icon">💊</span><h4>בריאות</h4><p>"שמעתי שזה עוזר" = טענה. מחקר מבוקר = הוכחה.</p></div>
  <div class="ex-card"><span class="icon">💬</span><h4>שמועה</h4><p>"מישהו אמר ש..." = טענה. לבדוק ישירות = הוכחה.</p></div>
</div>`,

// 13 - Closing
`<p class="kicker">לסיכום</p>
<p class="quote" style="font-size:2.4em;">בעולם עם <span class="accent-blue">AI</span> שעונה על הכל —
<span class="accent-gold">המיומנות הכי חשובה</span> היא לדעת מה עדיין דורש <span class="accent-green">בדיקה</span>.</p>`
];

let current = 0;
const deck = document.getElementById('deck');
const dotsContainer = document.getElementById('dots');

slidesHTML.forEach((html, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.innerHTML = html;
  deck.appendChild(div);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dotsContainer.appendChild(dot);
});

const slideEls = document.querySelectorAll('.slide');
const dotEls = document.querySelectorAll('.dot');
const counter = document.getElementById('slide-counter');
const btnNext = document.getElementById('btn-next');
const btnPrev = document.getElementById('btn-prev');

function render(){
  slideEls.forEach((s,i)=> s.classList.toggle('active', i===current));
  dotEls.forEach((d,i)=> d.classList.toggle('active', i===current));
  counter.textContent = `${current+1} / ${slidesHTML.length}`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === slidesHTML.length - 1;
}
function goTo(i){ current = Math.max(0, Math.min(slidesHTML.length-1, i)); render(); }
function next(){ goTo(current+1); }
function prev(){ goTo(current-1); }

btnNext.onclick = next;
btnPrev.onclick = prev;

document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowLeft' || e.key === ' '){ e.preventDefault(); next(); }
  else if(e.key === 'ArrowRight'){ e.preventDefault(); prev(); }
});

render();
</script>
</body>
</html>
