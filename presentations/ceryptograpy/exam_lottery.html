<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 הגרלת מבחן מגן — פרויקט סיום</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  :root {
    --bg: #0a0c12;
    --panel: #111520;
    --border: #1e2a40;
    --accent1: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7dff6b;
    --accent4: #d4a6ff;
    --accent5: #ffda5e;
    --text: #e8eaf0;
    --muted: #6a7590;
    --glow1: rgba(0,212,255,0.15);
    --glow2: rgba(255,107,53,0.15);
    --glow3: rgba(125,255,107,0.15);
    --glow4: rgba(212,166,255,0.15);
    --glow5: rgba(255,218,94,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Alef', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(0,212,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(212,166,255,0.06) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--accent1);
    text-shadow: 0 0 24px rgba(0,212,255,0.5);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  header p {
    color: var(--muted);
    font-size: 1.2rem;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Student name input */
  .student-bar {
    display: flex;
    gap: 12px;
    max-width: 640px;
    margin: 0 auto 32px;
    align-items: center;
  }

  .student-bar input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Alef', sans-serif;
    font-size: 1.2rem;
    padding: 12px 16px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    text-align: right;
  }
  .student-bar input:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 12px var(--glow1);
  }

  .btn-main {
    background: linear-gradient(135deg, #00b4d8, #0077b6);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .btn-main:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,180,216,0.4);
  }
  .btn-main:active { transform: translateY(0); }
  .btn-main:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Cards grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto 28px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px;
    height: 100%;
    border-radius: 0 14px 14px 0;
  }

  .card.crypto::before  { background: var(--accent1); }
  .card.files::before   { background: var(--accent3); }
  .card.gradio::before  { background: var(--accent4); }
  .card.security::before{ background: var(--accent2); }
  .card.task::before    { background: var(--accent5); }

  .card.crypto  { --clr: var(--accent1); --glow: var(--glow1); }
  .card.files   { --clr: var(--accent3); --glow: var(--glow3); }
  .card.gradio  { --clr: var(--accent4); --glow: var(--glow4); }
  .card.security{ --clr: var(--accent2); --glow: var(--glow2); }
  .card.task    { --clr: var(--accent5); --glow: var(--glow5); }

  .card.revealed {
    border-color: var(--clr);
    box-shadow: 0 0 28px var(--glow), inset 0 0 40px var(--glow);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .card-icon {
    font-size: 1.5rem;
    line-height: 1;
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--clr);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .q-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    color: var(--muted);
    margin-right: auto;
  }

  .question-area {
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .question-placeholder {
    color: var(--muted);
    font-size: 1.2rem;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
  }

  .question-text {
    display: none;
    font-size: 1.2rem;
    line-height: 1.7;
    color: var(--text);
    text-align: right;
    animation: fadeSlide 0.4s ease;
  }

  .question-text.show {
    display: block;
  }

  /* Slot machine animation */
  .slot-wrapper {
    overflow: hidden;
    height: 80px;
    display: none;
  }
  .slot-wrapper.active { display: block; }
  .slot-reel {
    animation: spin 0.6s ease-out;
  }

  @keyframes spin {
    0%   { transform: translateY(-200%); opacity: 0; }
    60%  { transform: translateY(10%); opacity: 1; }
    80%  { transform: translateY(-5%); }
    100% { transform: translateY(0); }
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Task card - full width */
  .task-row {
    max-width: 1200px;
    margin: 0 auto 32px;
  }

  .card.task {
    border-top: 2px solid var(--accent5);
  }

  .difficulty-badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 10px;
    margin-bottom: 4px;
  }
  .badge-easy   { background: rgba(125,255,107,0.15); color: var(--accent3); }
  .badge-medium { background: rgba(255,218,94,0.15);  color: var(--accent5); }
  .badge-hard   { background: rgba(255,107,53,0.15);  color: var(--accent2); }

  /* Action buttons row */
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    max-width: 640px;
    margin: 0 auto 40px;
    flex-wrap: wrap;
  }

  .btn-reroll {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Alef', sans-serif;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reroll:hover {
    border-color: var(--accent1);
    color: var(--accent1);
    box-shadow: 0 0 10px var(--glow1);
  }

  .btn-print {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Alef', sans-serif;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-print:hover {
    border-color: var(--accent4);
    color: var(--accent4);
    box-shadow: 0 0 10px var(--glow4);
  }

  /* Timer */
  .timer-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    max-width: 640px;
    margin: 0 auto 32px;
    flex-wrap: wrap;
  }

  .timer-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 22px;
    text-align: center;
    min-width: 130px;
  }
  .timer-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.2rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .timer-display {
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent1);
    letter-spacing: 2px;
  }
  .timer-display.warn { color: var(--accent2); }
  .timer-controls {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }
  .tc-btn {
    background: var(--border);
    border: none;
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: background 0.2s;
  }
  .tc-btn:hover { background: var(--accent1); color: #000; }

  /* student name display */
  .student-display {
    text-align: center;
    margin-bottom: 24px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent1);
    font-size: 1rem;
    letter-spacing: 2px;
    min-height: 24px;
  }

  /* Print styles */
  @media print {
    body { background: white; color: black; padding: 16px; }
    .actions, .timer-row, .student-bar, header p { display: none; }
    .card { border: 1px solid #ccc; box-shadow: none; background: white; }
    .card::before { display: none; }
    .question-text { color: black; display: block !important; }
    .question-placeholder { display: none; }
    header h1 { color: black; text-shadow: none; }
    .card-title { color: black; }
    .student-display { color: black; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>🎲 הגרלת מבחן מגן</h1>
  <p>בית הספר בליך · יחידת סייבר · תשפ"ו</p>
</header>

<div class="student-bar">
  <input type="text" id="studentName" placeholder="שם התלמיד/ה..." />
  <button class="btn-main" id="rollBtn" onclick="rollAll()">▶ הגרל!</button>
</div>

<div class="student-display" id="studentDisplay"></div>

<div class="grid">
  <!-- Card 1: Cryptography -->
  <div class="card crypto" id="card-crypto">
    <div class="card-header">
      <span class="card-icon">🔐</span>
      <span class="card-title">הצפנה וקריפטוגרפיה</span>
      <span class="q-num" id="qnum-crypto"></span>
    </div>
    <div class="question-area">
      <div class="question-placeholder" id="ph-crypto">ממתין להגרלה...</div>
      <div class="question-text" id="qt-crypto"></div>
    </div>
  </div>

  <!-- Card 2: Files, Data Structures, Testing -->
  <div class="card files" id="card-files">
    <div class="card-header">
      <span class="card-icon">📁</span>
      <span class="card-title">קבצים · מבני נתונים · בדיקות</span>
      <span class="q-num" id="qnum-files"></span>
    </div>
    <div class="question-area">
      <div class="question-placeholder" id="ph-files">ממתין להגרלה...</div>
      <div class="question-text" id="qt-files"></div>
    </div>
  </div>

  <!-- Card 3: Gradio & Data Display -->
  <div class="card gradio" id="card-gradio">
    <div class="card-header">
      <span class="card-icon">🎨</span>
      <span class="card-title">Gradio · ממשק והצגת נתונים</span>
      <span class="q-num" id="qnum-gradio"></span>
    </div>
    <div class="question-area">
      <div class="question-placeholder" id="ph-gradio">ממתין להגרלה...</div>
      <div class="question-text" id="qt-gradio"></div>
    </div>
  </div>

  <!-- Card 4: Security -->
  <div class="card security" id="card-security">
    <div class="card-header">
      <span class="card-icon">🛡️</span>
      <span class="card-title">אבטחת מידע</span>
      <span class="q-num" id="qnum-security"></span>
    </div>
    <div class="question-area">
      <div class="question-placeholder" id="ph-security">ממתין להגרלה...</div>
      <div class="question-text" id="qt-security"></div>
    </div>
  </div>
</div>

<!-- Task Card - full width -->
<div class="task-row">
  <div class="card task" id="card-task">
    <div class="card-header">
      <span class="card-icon">⚡</span>
      <span class="card-title">משימה לביצוע</span>
      <span class="q-num" id="qnum-task"></span>
    </div>
    <div class="question-area">
      <div class="question-placeholder" id="ph-task">ממתין להגרלה...</div>
      <div class="question-text" id="qt-task"></div>
    </div>
  </div>
</div>

<!-- Actions -->
<div class="actions">
  <button class="btn-reroll" onclick="rerollSingle('crypto')"  id="rb-crypto"  disabled>🔄 הצפנה מחדש</button>
  <button class="btn-reroll" onclick="rerollSingle('files')"   id="rb-files"   disabled>🔄 קבצים מחדש</button>
  <button class="btn-reroll" onclick="rerollSingle('gradio')"  id="rb-gradio"  disabled>🔄 Gradio מחדש</button>
  <button class="btn-reroll" onclick="rerollSingle('security')"id="rb-security" disabled>🔄 אבטחה מחדש</button>
  <button class="btn-reroll" onclick="rerollSingle('task')"    id="rb-task"    disabled>⚡ משימה מחדש</button>
  <button class="btn-print"  onclick="window.print()"                          disabled id="printBtn">🖨️ הדפסה</button>
</div>

<!-- Timers -->
<div class="timer-row" id="timerRow" style="display:none">
  <div class="timer-box">
    <div class="timer-label">⏱ שאלות תיאורטיות</div>
    <div class="timer-display" id="timer1">20:00</div>
    <div class="timer-controls">
      <button class="tc-btn" onclick="startTimer(1)">▶</button>
      <button class="tc-btn" onclick="pauseTimer(1)">⏸</button>
      <button class="tc-btn" onclick="resetTimer(1,20)">↺</button>
    </div>
  </div>
  <div class="timer-box">
    <div class="timer-label">⚡ משימה מעשית</div>
    <div class="timer-display" id="timer2">15:00</div>
    <div class="timer-controls">
      <button class="tc-btn" onclick="startTimer(2)">▶</button>
      <button class="tc-btn" onclick="pauseTimer(2)">⏸</button>
      <button class="tc-btn" onclick="resetTimer(2,15)">↺</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// QUESTION BANKS
// ============================================================

const banks = {
  crypto: [
    // Caesar
    "מהי הצפנת קיסר? הסבר עם דוגמה מספרית — הצפן את המילה \"HELLO\" עם מפתח 3.",
    "איך פורצים הצפנת קיסר? הסבר את שיטת Brute Force — כמה ניסיונות נחוצים ולמה?",
    "נתון לך הטקסט המוצפן \"KHOOR\" והמפתח הוא 3. מה הטקסט המקורי? הראה את חישוב הפענוח.",
    "מדוע הצפנת קיסר נחשבת ל\"צופן נאיבי\"? פרט לפחות שתי חולשות.",
    // Substitution
    "מהו צופן החלפה פשוטה? כמה מפתחות אפשריים קיימים — הסבר את החישוב.",
    "מהו ניתוח תדירויות (Frequency Analysis)? איך הוא מסייע לפרוץ צופן החלפה?",
    "מה ההבדל בין Caesar ל-Simple Substitution מבחינת קושי הפריצה?",
    // Affine/Multiplicative
    "מהו צופן Affine? כתוב את נוסחת ההצפנה והפענוח.",
    "מהו מפתח חוקי בצופן Multiplicative? מדוע מפתח כמו 13 פסול? הסבר עם GCD.",
    "הצפן את האות 'H' (ערך 7) עם צופן Multiplicative עם מפתח 5. מה התוצאה? הראה את החישוב.",
    // Transposition
    "מהי הצפנת Transposition? מה ההבדל בינה לבין הצפנת Substitution?",
    "תאר את האלגוריתם להצפנת Transposition עם סיסמה — כיצד הסיסמה קובעת את סדר העמודות?",
    "נתון מערך 3×4. כיצד ממלאים אותו עם המחרוזת \"CRYPTOGRAPHY\"?",
    "מהו תפקיד פונקציית is_english בפריצת Transposition? מדוע היא נדרשת?",
    // Rail Fence
    "הסבר את צופן Rail Fence: איך הוא עובד? תן דוגמה עם \"HELLO WORLD\" ו-2 rails.",
    "כמה מפתחות אפשריים יש לפרוץ ב-Rail Fence? מדוע הפריצה פשוטה יחסית?",
    // Vigenère
    "מהו צופן Vigenère? כיצד הוא שונה מ-Caesar?",
    "מה הופך את Vigenère לקשה יותר לפריצה מ-Caesar? הסבר את תפקיד המפתח החוזר.",
    // General
    "מהו modulo (%) ומה תפקידו בהצפנה? תן דוגמה קונקרטית.",
    "מהו ASCII? כיצד הוא קשור להצפנה? מה ערכי ASCII של 'A' ו-'a'?",
    "מהי הצפנה כפולה? האם היא תמיד מכפילה את רמת האבטחה? הסבר.",
    "מהי קריפטוגרפיה סימטרית לעומת אסימטרית? תן דוגמה לכל סוג.",
  ],

  files: [
    // File I/O
    "כתוב קוד Python לקריאת קובץ טקסט ולהדפסת שורותיו. מה ההבדל בין מצב 'r' ל-'rb'?",
    "מה ההבדל בין מצב 'w' ל-'a' בפתיחת קובץ בפייתון? מתי נשתמש בכל אחד?",
    "מדוע חשוב להשתמש ב-with open() במקום open() רגיל? מה קורה אם לא סוגרים קובץ?",
    "כיצד קוראים קובץ JSON בפייתון? כתוב קוד לדוגמה עם json.load().",
    // Data Structures
    "מה ההבדל בין list, tuple ו-set בפייתון? מתי נבחר בכל אחד?",
    "מהו dictionary בפייתון? תן דוגמה לשימוש ב-dictionary עבור מיפוי אותיות בהצפנה.",
    "מהי רשימה דו-ממדית? כיצד יוצרים גריד 3×4 ריק בפייתון?",
    "הסבר string slicing בפייתון: מה יהיה הפלט של text[::2] עבור 'HELLO'?",
    "מהו chr() ו-ord()? הסבר את תפקידם בקריפטוגרפיה עם דוגמה.",
    // Exceptions
    "מהו Exception? תן 3 דוגמאות לחריגים נפוצים בפייתון ומתי הם נזרקים.",
    "הסבר את מבנה try-except-finally. מה תפקיד כל בלוק?",
    "מה ההבדל בין Exception לבין Error? מדוע כדאי לתפוס חריגים ספציפיים ולא Exception כללי?",
    // Testing
    "מהן בדיקות תוכנה? פרט 3 סוגי בדיקות שונים (unit, integration, regression).",
    "מהו pytest ואיך משתמשים בו? כתוב פונקציית בדיקה פשוטה לאימות הצפנת קיסר.",
    "מהו assert? הסבר עם דוגמה לבדיקת פענוח נכון.",
    "מהי בדיקת Round-trip? מדוע היא חשובה במיוחד בקריפטוגרפיה?",
    "מה ההבדל בין בדיקת גבולות (edge cases) לבדיקות רגילות? תן דוגמה.",
    // Advanced
    "מה היתרון של הפרדה לפונקציות קטנות (Single Responsibility) מבחינת בדיקות?",
    "כיצד תכתוב בדיקה שמוודאת שפונקציית הצפנה זורקת ValueError על קלט לא חוקי?",
    "מהו logging בפייתון? מדוע עדיף על print() בפרויקטים אמיתיים?",
  ],

// ============================================================
// STATE
// ============================================================
const drawn = { crypto: -1, files: -1, gradio: -1, security: -1, task: -1 };
let rolled = false;
const timers = { 1: null, 2: null };
const timerState = { 1: { remaining: 1200, running: false }, 2: { remaining: 900, running: false } };

// ============================================================
// LOTTERY LOGIC
// ============================================================
function pick(pool, exclude = -1) {
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); } while (idx === exclude && pool.length > 1);
  return idx;
}

function revealCard(category, idx, animate = true) {
  const card  = document.getElementById('card-' + category);
  const ph    = document.getElementById('ph-' + category);
  const qt    = document.getElementById('qt-' + category);
  const qnum  = document.getElementById('qnum-' + category);

  const isTask = category === 'task';
  const data = isTask ? banks.task[idx] : banks[category][idx];

  card.classList.add('revealed');
  ph.style.display = 'none';
  qt.classList.add('show');

  if (isTask) {
    const level = data.level;
    const badgeClass = level === 'easy' ? 'badge-easy' : level === 'medium' ? 'badge-medium' : 'badge-hard';
    const labelText  = level === 'easy' ? '🟢 רמה קלה' : level === 'medium' ? '🟡 רמה בינונית' : '🔴 רמה קשה';
    qt.innerHTML = `<div class="difficulty-badge ${badgeClass}">${labelText}</div><div>${data.text.split('\n').slice(1).join('<br>')}</div>`;
    qnum.textContent = `#${idx + 1}/${banks.task.length}`;
  } else {
    qt.textContent = data;
    qnum.textContent = `#${idx + 1}/${banks[category].length}`;
  }

  drawn[category] = idx;
}

function rollAll() {
  const name = document.getElementById('studentName').value.trim();
  if (!name) {
    document.getElementById('studentName').focus();
    document.getElementById('studentName').style.borderColor = 'var(--accent2)';
    setTimeout(() => document.getElementById('studentName').style.borderColor = '', 1500);
    return;
  }

  document.getElementById('studentDisplay').textContent = `▶  ${name}  ◀`;

  const cats = ['crypto', 'files', 'gradio', 'security', 'task'];
  cats.forEach((cat, i) => {
    setTimeout(() => {
      const pool = cat === 'task' ? banks.task : banks[cat];
      const idx = pick(pool);
      revealCard(cat, idx);
    }, i * 180);
  });

  // Enable controls
  setTimeout(() => {
    document.querySelectorAll('.btn-reroll').forEach(b => b.disabled = false);
    document.getElementById('printBtn').disabled = false;
    document.getElementById('rollBtn').textContent = '🔄 הגרל שוב';
    document.getElementById('timerRow').style.display = 'flex';
    rolled = true;
  }, cats.length * 180 + 200);
}

function rerollSingle(category) {
  const pool = category === 'task' ? banks.task : banks[category];
  const idx = pick(pool, drawn[category]);
  // reset
  const qt = document.getElementById('qt-' + category);
  qt.classList.remove('show');
  document.getElementById('card-' + category).classList.remove('revealed');
  setTimeout(() => revealCard(category, idx), 80);
}

// ============================================================
// TIMER LOGIC
// ============================================================
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function updateDisplay(n) {
  const el = document.getElementById('timer' + n);
  el.textContent = formatTime(timerState[n].remaining);
  el.classList.toggle('warn', timerState[n].remaining <= 60 && timerState[n].remaining > 0);
}

function startTimer(n) {
  if (timers[n]) return;
  timerState[n].running = true;
  timers[n] = setInterval(() => {
    if (timerState[n].remaining <= 0) {
      clearInterval(timers[n]); timers[n] = null;
      document.getElementById('timer' + n).textContent = '00:00';
      return;
    }
    timerState[n].remaining--;
    updateDisplay(n);
  }, 1000);
}

function pauseTimer(n) {
  clearInterval(timers[n]); timers[n] = null;
  timerState[n].running = false;
}

function resetTimer(n, minutes) {
  pauseTimer(n);
  timerState[n].remaining = minutes * 60;
  updateDisplay(n);
  document.getElementById('timer' + n).classList.remove('warn');
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('studentName')) rollAll();
});
